<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Sokal Master Edition 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 50px; }
        
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; text-transform: uppercase; font-weight: 700; }
        .maman-sokal { color: var(--pink); font-size: 0.85rem; font-weight: 500; }

        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }

        .grid-header { padding: 10px 10px 2px; color: var(--cyan); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .grid-selector { display: flex; gap: 4px; padding: 0 10px 10px; overflow-x: auto; }
        .grid-btn { flex: 0 0 18%; padding: 10px 4px; background: #000; border: 1px solid var(--pink); color: #fff; border-radius: 4px; font-size: 0.8rem; cursor: pointer; text-align: center; font-weight: 600; }
        .grid-btn.active { background: var(--pink); color: #000; border-color: var(--pink); }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; font-weight: 500; }
        label span { color: var(--green); font-weight: 600; }

        .adj-row { display: flex; align-items: center; gap: 5px; }
        .plus-minus { background: #000; color: #fff; border: 1px solid var(--pink); padding: 8px 12px; border-radius: 4px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        input[type=range] { flex: 1; accent-color: var(--pink); height: 30px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 0.85rem; }

        .btn-auto { background: var(--pink); color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }

        .preview-container { background: #111; padding: 20px; overflow-x: auto; display: flex; justify-content: center; min-height: 400px; border-top: 1px solid #333; margin-top: 10px; }
        .pages-wrapper { display: grid; gap: 15px; background: #222; padding: 15px; border-radius: 4px; }
        .a4-page { background: white; position: relative; width: 210px; height: 297px; box-shadow: 0 0 15px rgba(0,0,0,0.8); overflow: hidden; border: 1px solid #ccc; }
        
        /* Marges pointillés supprimées comme demandé */
        .margin-guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: none; }
        
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 120px; margin: 5px auto; }
        .dp-btn { background: #000; border: 1px solid #333; color: var(--cyan); padding: 10px; border-radius: 6px; cursor: pointer; font-size: 1.2rem; }
        
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<header>
    <h1>Stencil Print Pro</h1>
    <div class="maman-sokal">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">Reset</button>
    <button class="btn btn-exp" id="btnExp">Exporter A4 Sep.</button>
</div>

<div class="grid-header">Nombre de pages (Gabarit A4 Strict)</div>
<div class="grid-selector" id="gridSelect">
    <button class="grid-btn active" data-grid="1">1 Page</button>
    <button class="grid-btn" data-grid="2">2 (1x2)</button>
    <button class="grid-btn" data-grid="4">4 (2x2)</button>
    <button class="grid-btn" data-grid="6">6 (2x3)</button>
    <button class="grid-btn" data-grid="9">9 (3x3)</button>
    <button class="grid-btn" data-grid="12">12 (3x4)</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <button class="btn-auto" onclick="autoFit()">🎯 Ajuster & Centrer au Gabarit</button>
        <label>Zone protection invisible <span id="vMargin">10mm</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adjMargin(-1)">-</button>
            <input type="range" id="marginRange" min="0" max="35" value="10">
            <button class="plus-minus" onclick="adjMargin(1)">+</button>
        </div>
    </div>

    <div class="panel full">
        <label>Mode de Rendu Global</label>
        <select id="renderStyle" onchange="st.style=this.value;render()">
            <option value="original">IMAGE ORIGINALE (Photo)</option>
            <option value="linework">LINEWORK (contours purs)</option>
            <option value="shades">RÉALISTE (Gris Doux)</option>
            <option value="dotwork">POINTILLISME HD (Dotwork)</option>
            <option value="flash">LIGNES NETTES (Flash)</option>
        </select>
    </div>

    <div class="panel">
        <label>Netteté <span id="vSharp">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('sharp', -5)">-</button>
            <input type="range" id="sharp" min="0" max="100" value="0">
            <button class="plus-minus" onclick="adj('sharp', 5)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Contraste / Noir <span id="vBlack">128</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('black', -10)">-</button>
            <input type="range" id="black" min="1" max="254" value="128">
            <button class="plus-minus" onclick="adj('black', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Luminosité <span id="vBright">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('bright', -10)">-</button>
            <input type="range" id="bright" min="-100" max="100" value="0">
            <button class="plus-minus" onclick="adj('bright', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Taille <span id="vSize">90%</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('size', -10)">-</button>
            <input type="range" id="size" min="5" max="1500" value="90">
            <button class="plus-minus" onclick="adj('size', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Miroir (Stencil)</label>
        <select id="mirror" onchange="st.mirror=parseInt(this.value);render()">
            <option value="1">NON</option>
            <option value="-1">OUI</option>
        </select>
    </div>

    <div class="panel">
        <label>Position (D-Pad)</label>
        <div class="d-pad">
            <div></div><button class="dp-btn" onclick="move(0,-150)">▲</button><div></div>
            <button class="dp-btn" onclick="move(-150,0)">◀</button>
            <button class="dp-btn" onclick="st.x=0;st.y=0;render()">◎</button>
            <button class="dp-btn" onclick="move(150,0)">▶</button>
            <div></div><button class="dp-btn" onclick="move(0,150)">▼</button><div></div>
        </div>
    </div>
</div>

<div class="preview-container">
    <div class="pages-wrapper" id="pagesWrapper"></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let img = null;
    let st = { x:0, y:0, size:90, black:128, bright:0, sharp:0, margin:10, mirror:1, grid:1, style:'original' };

    function updateGridUI() {
        const wrapper = $('pagesWrapper');
        wrapper.innerHTML = '';
        
        let cols = 1;
        if (st.grid === 2) cols = 2;
        else if (st.grid === 4) cols = 2;
        else if (st.grid >= 6) cols = 3;
        
        wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        for(let i=0; i < st.grid; i++) {
            const page = document.createElement('div');
            page.className = 'a4-page';
            // Pointillés supprimés dans updateGridUI
            page.innerHTML = `<div class="margin-guide" id="guide-${i}"></div><canvas id="cv-${i}"></canvas>`;
            wrapper.appendChild(page);
        }
        render();
    }

    function adjMargin(delta) {
        st.margin = Math.max(0, Math.min(35, st.margin + delta));
        $('marginRange').value = st.margin;
        $('vMargin').textContent = st.margin + 'mm';
        render();
    }

    $('marginRange').oninput = e => {
        st.margin = parseInt(e.target.value);
        $('vMargin').textContent = st.margin + 'mm';
        render();
    };

    // CORRECTION : AJUSTER & CENTRER AU GABARIT STRICT
    function autoFit() {
        if(!img) return;
        st.x = 0; st.y = 0; // Recentrer parfaitement l'image globale
        let cols = (st.grid === 2 || st.grid === 4) ? 2 : (st.grid >= 6 ? 3 : 1);
        st.size = (cols * 100) - (st.margin * 3); // Taille de sécurité
        $('size').value = st.size;
        render();
    }

    $('fIn').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            img = new Image();
            img.onload = () => { autoFit(); };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function adj(id, delta) {
        let input = $(id);
        let val = parseFloat(input.value) + delta;
        input.value = val;
        st[id] = val;
        render();
    }

    function move(dx, dy) { st.x += dx; st.y += dy; render(); }

    function render() {
        if(!img) return;
        const canvases = document.querySelectorAll('canvas');
        const A4_W = 2480, A4_H = 3508;
        
        let cols = 1;
        if (st.grid === 2) cols = 2;
        else if (st.grid === 4) cols = 2;
        else if (st.grid >= 6) cols = 3;
        const rows = Math.ceil(st.grid / cols);

        canvases.forEach((cv, i) => {
            cv.width = A4_W; cv.height = A4_H;
            const ctx = cv.getContext('2d', { willReadFrequently: true });
            ctx.fillStyle = "white"; ctx.fillRect(0,0,A4_W,A4_H);
            
            ctx.save();
            const colIdx = i % cols;
            const rowIdx = Math.floor(i / cols);
            
            // Logique de division réelle : Chaque canvas montre sa portion de la mosaïque
            ctx.translate(-colIdx * A4_W, -rowIdx * A4_H);
            
            // Centrage Strict : L'origine du motif global est au centre de la mosaïque (pages x colonnes)
            // Cela assure que l'assemblage au salon sera parfait.
            ctx.translate((cols * A4_W)/2 + st.x, (rows * A4_H)/2 + st.y);
            
            // Miroir (Flip Stencil)
            ctx.scale(st.mirror, 1);
            
            // Dessin de l'image (Ajustement par Taille %)
            let dw = A4_W * (st.size/100), dh = dw * (img.height/img.width);
            ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
            ctx.restore();
            
            // Application des filtres de style (shades, dotwork, linework)
            if (st.style !== 'original') applyFilters(ctx, A4_W, A4_H);
        });
        
        updateLabels();
    }

    function applyFilters(ctx, w, h) {
        const idata = ctx.getImageData(0,0,w,h);
        const d = idata.data;
        const temp = new Uint8ClampedArray(d);
        const sh = st.sharp / 8; // Force de la netteté

        for (let i = 0; i < d.length; i += 4) {
            let gray = (d[i] + d[i+1] + d[i+2]) / 3;

            // Netteté (Boost contours)
            if (sh > 0 && i > w*4) {
                let neighbor = (temp[i-w*4] + temp[i-4]) / 2;
                gray += (gray - neighbor) * sh;
            }

            gray += st.bright;

            if (st.style === 'linework') {
                if(i > 4) {
                    let grayL = (temp[i-4] + temp[i-3] + temp[i-2]) / 3;
                    gray = Math.abs(gray - grayL) > (255 - st.black) / 8 ? 0 : 255;
                }
            } else if (st.style === 'dotwork') {
                let x = (i/4)%w, y = Math.floor((i/4)/w);
                let thr = ((x % 4) * 4 + (y % 4)) * 16;
                gray = gray < (st.black * (thr/255)) ? 0 : 255;
            } else if (st.style === 'shades') {
                gray = gray < st.black ? (gray < st.black/2 ? 0 : 160) : 255;
            } else {
                gray = gray < st.black ? 0 : 255;
            }
            d[i] = d[i+1] = d[i+2] = gray;
        }
        ctx.putImageData(idata, 0,0);
    }

    function updateLabels() {
        $('vSharp').textContent = st.sharp;
        $('vBlack').textContent = st.black;
        $('vBright').textContent = st.bright;
        $('vSize').textContent = Math.round(st.size) + "%";
    }

    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelector('.grid-btn.active').classList.remove('active');
            btn.classList.add('active');
            st.grid = parseInt(btn.dataset.grid);
            updateGridUI();
        };
    });

    // CORRECTION : EXPORTER CHAQUE PAGE A4 SÉPARÉMENT
    $('btnExp').onclick = () => {
        if(!img) return;
        document.querySelectorAll('canvas').forEach((cv, i) => {
            const link = document.createElement('a');
            link.download = `Stencil_Sokal_Page_${i+1}.png`; // 1 Cliq = X images A4 Sep.
            link.href = cv.toDataURL('image/png');
            link.click();
        });
    };

    ['sharp','black','bright','size'].forEach(id => {
        $(id).oninput = e => { st[id] = parseFloat(e.target.value); render(); };
    });

    updateGridUI();
</script>
</body>
</html>
