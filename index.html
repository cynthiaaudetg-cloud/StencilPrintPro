<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stencil Print Pro | Édition Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #ff007a; --accent-glow: rgba(255, 0, 122, 0.3);
  --secondary: #00f2ff; --bg: #050508; --card: #12121a;
  --border: rgba(255, 255, 255, 0.1); --text: #eef0f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
header { background: linear-gradient(to bottom, #1a1a25, var(--bg)); padding: 20px; border-bottom: 1px solid var(--border); text-align: center; }
h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-style: italic; background: linear-gradient(to right, var(--accent), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { font-size: 0.6rem; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-top: 5px; }
.main-toolbar { display: flex; gap: 10px; padding: 12px; background: var(--card); border-bottom: 1px solid var(--border); justify-content: center; position: sticky; top: 0; z-index: 10; }
.btn-premium { background: #1a1a25; color: white; border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
.btn-primary { background: linear-gradient(135deg, var(--accent), #b000ff); border: none; box-shadow: 0 4px 12px var(--accent-glow); }
.btn-secondary { background: linear-gradient(135deg, var(--secondary), #006aff); border: none; color: #000; }
.controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 15px; background: rgba(255,255,255,0.02); }
.control-item { display: flex; flex-direction: column; gap: 6px; }
.control-item label { font-size: 0.6rem; font-weight: 700; color: #888; text-transform: uppercase; }
.val { font-size: 0.7rem; color: var(--secondary); margin-left: 5px; }
input[type=range] { accent-color: var(--accent); cursor: pointer; }
select { background: #1a1a25; color: white; border: 1px solid var(--border); padding: 6px; border-radius: 6px; font-size: 0.75rem; }
.workspace { flex: 1; padding: 30px 15px; display: flex; justify-content: center; background: #050508; overflow: auto; }
.canvas-container { display: flex; flex-direction: column; gap: 25px; align-items: center; }
.page-sheet { background: white; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; margin-bottom: 20px; }
#modal-export { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; overflow-y: auto; padding: 15px; }
.export-card { background: #111; margin-bottom: 15px; padding: 10px; border-radius: 12px; text-align: center; }
.export-card img { width: 100%; border: 1px solid #333; border-radius: 4px; margin-bottom: 8px; }
</style>
</head>
<body>
<header><h1>Stencil Print Pro</h1><div class="subtitle">Art & Precision Studio</div></header>
<div class="main-toolbar">
    <label for="fileInput" class="btn-premium btn-primary">✦ Image</label>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <button class="btn-premium" onclick="location.reload()">✕ Reset</button>
    <button class="btn-premium btn-secondary" id="btnExport" disabled>⬇ Exporter</button>
</div>
<div class="controls-grid">
    <div class="control-item"><label>Taille <span id="vSize" class="val">100%</span></label><input type="range" id="sizeS" min="10" max="600" value="100"></div>
    <div class="control-item"><label>Marge (Dave=0) <span id="vMarg" class="val">8mm</span></label><input type="range" id="margS" min="0" max="25" value="8"></div>
    <div class="control-item"><label>Traits (Détails) <span id="vDet" class="val">Net</span></label><input type="range" id="detS" min="1" max="4" value="1" step="0.5"></div>
    <div class="control-item"><label>Trame (Fumée/Dot) <span id="vDith" class="val">Non</span></label><input type="range" id="dithS" min="0" max="2" value="0" step="1"></div>
    <div class="control-item"><label>Pages</label><select id="pageS"><option value="1">1 Page</option><option value="4">4 Pages</option><option value="9" selected>9 Pages</option></select></div>
</div>
<div class="workspace"><div id="printArea" class="canvas-container"></div></div>
<div id="modal-export"><button class="btn-premium" style="width:100%; margin-bottom:15px" onclick="closeModal()">✕ Retour</button><div id="exportList"></div></div>
<script>
let state = { img: null, size: 100, pages: 9, margin: 8, detail: 1, dithering: 0 };
const A4_W = 794, A4_H = 1123;
const $ = id => document.getElementById(id);
$('fileInput').onchange = (e) => {
    const reader = new FileReader(); reader.onload = (event) => {
        const img = new Image(); img.onload = () => { state.img = img; $('btnExport').disabled = false; render(); };
        img.src = event.target.result;
    }; reader.readAsDataURL(e.target.files[0]);
};
$('sizeS').oninput = (e) => { state.size = e.target.value; $('vSize').textContent = e.target.value+'%'; render(); };
$('margS').oninput = (e) => { state.margin = e.target.value; $('vMarg').textContent = e.target.value+'mm'; render(); };
$('pageS').onchange = (e) => { state.pages = parseInt(e.target.value); render(); };
$('detS').oninput = (e) => { state.detail = e.target.value; $('vDet').textContent = e.target.value > 1 ? 'Épais' : 'Net'; render(); };
$('dithS').oninput = (e) => { 
    state.dithering = parseInt(e.target.value); 
    const labels = ["Non", "Léger (Fumée)", "Intense"];
    $('vDith').textContent = labels[state.dithering]; render(); 
};
function applySoftDithering(imageData, intensity) {
    const d = imageData.data;
    const threshold = intensity === 1 ? 195 : 145; 
    for (let i = 0; i < d.length; i += 4) {
        let avg = (d[i] + d[i+1] + d[i+2]) / 3;
        if (avg > 240) { d[i] = d[i+1] = d[i+2] = 255; continue; }
        let rand = Math.random() * 255;
        let newValue = (avg < threshold && avg < rand) ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = newValue;
    }
}
function render() {
    const area = $('printArea'); area.innerHTML = '';
    if(!state.img) return;
    const finalCols = Math.sqrt(state.pages);
    const marginPx = state.margin * 3.78;
    for(let i=0; i < state.pages; i++) {
        const sheet = document.createElement('div');
        sheet.className = 'page-sheet';
        sheet.style.width = (A4_W * 0.45) + 'px'; sheet.style.height = (A4_H * 0.45) + 'px';
        const canvas = document.createElement('canvas');
        canvas.width = A4_W; canvas.height = A4_H;
        canvas.style.width = "100%";
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "white"; ctx.fillRect(0,0,A4_W,A4_H);
        const col = i % finalCols; const row = Math.floor(i / finalCols);
        ctx.save();
        ctx.rect(marginPx, marginPx, A4_W - marginPx*2, A4_H - marginPx*2);
        ctx.clip();
        if (state.detail > 1) ctx.filter = `blur(${state.detail - 1}px)`;
        const dw = (A4_W - marginPx*2) * (state.size/100) * finalCols;
        const ratio = state.img.height / state.img.width;
        ctx.drawImage(state.img, marginPx - col * (A4_W - marginPx*2), marginPx - row * (A4_H - marginPx*2), dw, dw * ratio);
        if(state.dithering > 0) {
            const id = ctx.getImageData(0,0,A4_W,A4_H);
            applySoftDithering(id, state.dithering);
            ctx.putImageData(id, 0, 0);
        }
        ctx.restore();
        sheet.appendChild(canvas);
        area.appendChild(sheet);
    }
}
$('btnExport').onclick = () => {
    const list = $('exportList'); list.innerHTML = '';
    document.querySelectorAll('canvas').forEach((c, idx) => {
        const card = document.createElement('div'); card.className = 'export-card';
        const img = new Image(); img.src = c.toDataURL("image/png");
        card.appendChild(img);
        const b = document.createElement('button'); b.className = "btn-premium btn-primary"; b.style.width="100%";
        b.textContent = "Page "+(idx+1)+" : Sauvegarder";
        card.appendChild(b); list.appendChild(card);
    });
    $('modal-export').style.display = 'flex';
};
function closeModal() { $('modal-export').style.display = 'none'; }
</script>
</body>
</html>
