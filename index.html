<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Sokal Master Control 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 30px; }
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; font-weight: 700; text-transform: uppercase; }
        .sig-header { color: var(--pink); font-size: 0.9rem; font-weight: 500; }
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; font-weight: 500; }
        input[type=range] { width: 100%; accent-color: var(--pink); height: 25px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 7px; border-radius: 4px; font-size: 0.8rem; }
        .canvas-area { margin-top: 10px; padding: 5px; background: #000; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #2d2d44; }
        canvas { background: #fff; max-width: 100%; height: auto; display: block; border: 1px solid #555; }
    </style>
</head>
<body>

<header>
    <h1>Stencil Pro Masters</h1>
    <div class="sig-header">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">Effacer</button>
    <button class="btn btn-exp" id="btnExp">Exporter</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <label>Mode de Rendu Global</label>
        <select id="renderStyle">
            <option value="dotwork" selected>POINTILLISME HD (Dotwork)</option>
            <option value="shades">RÉALISME (Gris Doux)</option>
            <option value="bold">LIGNES NETTES (Contours)</option>
            <option value="original">IMAGE ORIGINALE (Photo)</option>
        </select>
    </div>

    <div class="panel">
        <label>Netteté <span id="vSharp">0</span></label>
        <input type="range" id="sharp" min="0" max="100" value="0">
    </div>
    <div class="panel">
        <label>Contraste <span id="vCont">1.0</span></label>
        <input type="range" id="contrast" min="0.5" max="2.5" step="0.1" value="1.0">
    </div>
    <div class="panel">
        <label>Luminosité <span id="vBright">0</span></label>
        <input type="range" id="bright" min="-100" max="100" value="0">
    </div>
    <div class="panel">
        <label>Noir / Tracé <span id="vBlack">128</span></label>
        <input type="range" id="black" min="0" max="255" value="128">
    </div>

    <div class="panel">
        <label>Taille <span id="vSize">100%</span></label>
        <input type="range" id="size" min="10" max="250" value="100">
    </div>
    <div class="panel">
        <label>Miroir</label>
        <select id="mirror">
            <option value="no">NON</option>
            <option value="yes">OUI</option>
        </select>
    </div>
</div>

<div class="canvas-area">
    <canvas id="gCanvas"></canvas>
</div>

<script>
    const $ = id => document.getElementById(id);
    const cv = $('gCanvas'), ctx = cv.getContext('2d');
    let img = null;
    let st = { size:100, black:128, bright:0, contrast:1.0, sharp:0, style:'dotwork', mirror:'no' };

    $('fIn').onchange = e => {
        const r = new FileReader();
        r.onload = ev => { img = new Image(); img.onload = render; img.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    function render() {
        if(!img) return;
        cv.width = 794; cv.height = 1123;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,cv.width,cv.height);
        
        ctx.save();
        ctx.translate(cv.width/2, cv.height/2);
        if(st.mirror === 'yes') ctx.scale(-1, 1);
        let dw = cv.width * (st.size/100), dh = dw * (img.height/img.width);
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        processImage();

        $('vBright').textContent = st.bright;
        $('vCont').textContent = st.contrast.toFixed(1);
        $('vSharp').textContent = st.sharp;
        $('vBlack').textContent = st.black;
        $('vSize').textContent = st.size + "%";
    }

    function processImage() {
        const idat = ctx.getImageData(0,0,cv.width,cv.height), d = idat.data, w = cv.width;
        const b = parseInt(st.bright), c = parseFloat(st.contrast), s = parseFloat(st.sharp)/10;
        const temp = new Uint8ClampedArray(d);

        for (let i = 0; i < d.length; i += 4) {
            let gray = (temp[i] + temp[i+1] + temp[i+2]) / 3;

            // 1. NETTETÉ (Appliqué en premier)
            if(s > 0 && i > w*4 && i < d.length - w*4) {
                let neighbor = (temp[i-w*4] + temp[i+w*4] + temp[i-4] + temp[i+4]) / 4;
                gray = gray + (gray - neighbor) * s;
            }

            // 2. CONTRASTE & LUMINOSITÉ (Modifie la source)
            gray = (gray - 128) * c + 128 + b;

            // 3. APPLICATION DES FILTRES SUR LA SOURCE MODIFIÉE
            if(st.style === 'dotwork') {
                let x = (i/4)%w, y = Math.floor((i/4)/w);
                let threshold = ((x % 4) * 4 + (y % 4)) * 16;
                let val = gray < (st.black * (threshold/255)) ? 0 : 255;
                d[i] = d[i+1] = d[i+2] = val;
            } 
            else if(st.style === 'shades') {
                // Réalisme : On garde les nuances créées par contraste/lum
                d[i] = d[i+1] = d[i+2] = gray < st.black ? (gray < st.black/2 ? 0 : 180) : 255;
            } 
            else if(st.style === 'bold') {
                // Lignes nettes : Se base sur la source contrastée
                let vL = (i > 4) ? (temp[i-4]+temp[i-3]+temp[i-2])/3 : gray;
                d[i] = d[i+1] = d[i+2] = Math.abs(gray - vL) > (255-st.black)/6 ? 0 : 255;
            } 
            else {
                // Image Originale : On affiche directement la source traitée
                let val = Math.max(0, Math.min(255, gray));
                // On applique quand même le curseur "Noir" comme un seuil de coupure
                d[i] = d[i+1] = d[i+2] = val < (255 - st.black) ? val : 255;
            }
        }
        ctx.putImageData(idat, 0,0);
        
        // Marge de sécurité
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.strokeRect(20, 20, cv.width-40, cv.height-40);
    }

    $('bright').oninput = e => { st.bright = e.target.value; render(); };
    $('contrast').oninput = e => { st.contrast = parseFloat(e.target.value); render(); };
    $('sharp').oninput = e => { st.sharp = e.target.value; render(); };
    $('black').oninput = e => { st.black = e.target.value; render(); };
    $('size').oninput = e => { st.size = e.target.value; render(); };
    $('renderStyle').onchange = e => { st.style = e.target.value; render(); };
    $('mirror').onchange = e => { st.mirror = e.target.value; render(); };
    $('btnExp').onclick = () => {
        const link = document.createElement('a');
        link.download = 'Sokal_Stencil_FullControl.png';
        link.href = cv.toDataURL(); link.click();
    };
</script>
</body>
</html>
