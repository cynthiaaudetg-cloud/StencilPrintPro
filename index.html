<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Final Edition 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 50px; }
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; text-transform: uppercase; }
        .maman-sokal { color: var(--pink); font-size: 0.8rem; font-weight: 500; }
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: #000; position: sticky; top: 0; z-index: 1000; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }
        .grid-header { padding: 10px 10px 2px; color: var(--cyan); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .grid-selector { display: flex; gap: 4px; padding: 0 10px 10px; overflow-x: auto; }
        .grid-btn { flex: 0 0 18%; padding: 8px 4px; background: #000; border: 1px solid var(--pink); color: #fff; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .grid-btn.active { background: var(--pink); color: #000; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; }
        label span { color: var(--green); font-weight: 600; }
        .adj-row { display: flex; align-items: center; gap: 5px; }
        .plus-minus { background: #000; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 4px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        input[type=range] { flex: 1; accent-color: var(--pink); height: 25px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 0.8rem; }
        .btn-auto { background: var(--pink); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; margin-bottom: 5px; }
        .preview-container { background: #111; padding: 20px; overflow-x: auto; display: flex; justify-content: center; }
        .pages-wrapper { display: grid; gap: 15px; background: #333; padding: 15px; border-radius: 4px; }
        .a4-page { background: white; position: relative; width: 210px; height: 297px; box-shadow: 0 0 15px rgba(0,0,0,0.7); overflow: hidden; }
        .margin-guide { position: absolute; border: 1px dashed rgba(255, 0, 0, 0.4); pointer-events: none; z-index: 10; transition: 0.2s; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 100px; margin: 0 auto; }
        .dp-btn { background: #000; border: 1px solid #333; color: var(--cyan); padding: 8px; border-radius: 5px; cursor: pointer; }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<header>
    <h1>Stencil Print Pro</h1>
    <div class="maman-sokal">Sokal | FINAL 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">Reset</button>
    <button class="btn btn-exp" id="btnExp">Exporter</button>
</div>

<div class="grid-header">Gabarit d'impression (Pages A4)</div>
<div class="grid-selector" id="gridSelect">
    <button class="grid-btn active" data-grid="1">1</button>
    <button class="grid-btn" data-grid="2">2</button>
    <button class="grid-btn" data-grid="4">4</button>
    <button class="grid-btn" data-grid="6">6</button>
    <button class="grid-btn" data-grid="9">9</button>
    <button class="grid-btn" data-grid="12">12</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <button class="btn-auto" onclick="autoFit()">🎯 Ajuster aux Marges</button>
        <label>Zone Marge Sécurité <span id="vMargin">10mm</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adjMargin(-1)">-</button>
            <input type="range" id="marginRange" min="0" max="30" value="10">
            <button class="plus-minus" onclick="adjMargin(1)">+</button>
        </div>
    </div>

    <div class="panel full">
        <label>Style de Rendu</label>
        <select id="renderStyle" onchange="st.style=this.value;render()">
            <option value="original">ORIGINAL (Ajustable)</option>
            <option value="shades">RÉALISTE (Gris Doux)</option>
            <option value="dotwork">DOTWORK (Pointillisme)</option>
            <option value="linework">LINEWORK (Livre Colorier)</option>
        </select>
    </div>

    <div class="panel">
        <label>Contraste <span id="vBlack">128</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('black', -10)">-</button>
            <input type="range" id="black" min="1" max="254" value="128">
            <button class="plus-minus" onclick="adj('black', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Taille Image <span id="vSize">90%</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('size', -10)">-</button>
            <input type="range" id="size" min="10" max="1000" value="90">
            <button class="plus-minus" onclick="adj('size', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Luminosité <span id="vBright">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('bright', -10)">-</button>
            <input type="range" id="bright" min="-100" max="100" value="0">
            <button class="plus-minus" onclick="adj('bright', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Miroir (Flip)</label>
        <select id="mirror" onchange="st.mirror=parseInt(this.value);render()">
            <option value="1">NON</option>
            <option value="-1">OUI</option>
        </select>
    </div>

    <div class="panel full">
        <label>Position (D-Pad)</label>
        <div class="d-pad">
            <div></div><button class="dp-btn" onclick="move(0,-100)">▲</button><div></div>
            <button class="dp-btn" onclick="move(-100,0)">◀</button>
            <button class="dp-btn" onclick="st.x=0;st.y=0;render()">◎</button>
            <button class="dp-btn" onclick="move(100,0)">▶</button>
            <div></div><button class="dp-btn" onclick="move(0,100)">▼</button><div></div>
        </div>
    </div>
</div>

<div class="preview-container">
    <div class="pages-wrapper" id="pagesWrapper"></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let img = null;
    let st = { x:0, y:0, size:90, black:128, bright:0, margin:10, mirror:1, grid:1, style:'original' };

    function updateGridUI() {
        const wrapper = $('pagesWrapper');
        wrapper.innerHTML = '';
        const cols = st.grid <= 2 ? st.grid : (st.grid === 4 ? 2 : 3);
        wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        for(let i=0; i < st.grid; i++) {
            const page = document.createElement('div');
            page.className = 'a4-page';
            page.innerHTML = `<div class="margin-guide" id="guide-${i}"></div><canvas id="cv-${i}"></canvas>`;
            wrapper.appendChild(page);
            updateMarginUI(i);
        }
        render();
    }

    function updateMarginUI(index) {
        const guide = $(`guide-${index}`);
        if(guide) {
            guide.style.top = guide.style.left = guide.style.right = guide.style.bottom = st.margin + 'mm';
        }
    }

    function adjMargin(delta) {
        st.margin = Math.max(0, Math.min(30, st.margin + delta));
        $('marginRange').value = st.margin;
        $('vMargin').textContent = st.margin + 'mm';
        for(let i=0; i < st.grid; i++) updateMarginUI(i);
        render();
    }

    $('marginRange').oninput = e => {
        st.margin = parseInt(e.target.value);
        $('vMargin').textContent = st.margin + 'mm';
        for(let i=0; i < st.grid; i++) updateMarginUI(i);
        render();
    };

    function autoFit() {
        st.x = 0; st.y = 0;
        st.size = 100 - (st.margin * 1.5); // Calcul intelligent selon la marge
        $('size').value = st.size;
        render();
    }

    $('fIn').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            img = new Image();
            img.onload = () => { autoFit(); };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function adj(id, delta) {
        $(id).value = parseFloat($(id).value) + delta;
        st[id] = parseFloat($(id).value);
        render();
    }

    function move(dx, dy) { st.x += dx; st.y += dy; render(); }

    function render() {
        if(!img) return;
        const canvases = document.querySelectorAll('canvas');
        const A4_W = 2480, A4_H = 3508;
        const cols = st.grid <= 2 ? st.grid : (st.grid === 4 ? 2 : 3);

        canvases.forEach((cv, i) => {
            cv.width = A4_W; cv.height = A4_H;
            const ctx = cv.getContext('2d', { willReadFrequently: true });
            ctx.fillStyle = "white"; ctx.fillRect(0,0,A4_W,A4_H);
            ctx.save();
            const colIdx = i % cols;
            const rowIdx = Math.floor(i / cols);
            ctx.translate(-colIdx * A4_W + A4_W/2 + st.x, -rowIdx * A4_H + A4_H/2 + st.y);
            ctx.scale(st.mirror, 1);
            let dw = A4_W * (st.size/100), dh = dw * (img.height/img.width);
            ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
            ctx.restore();
            
            if (st.style !== 'original') applyFilters(ctx, A4_W, A4_H);
        });
        $('vBlack').textContent = st.black;
        $('vBright').textContent = st.bright;
        $('vSize').textContent = Math.round(st.size) + "%";
    }

    function applyFilters(ctx, w, h) {
        const idata = ctx.getImageData(0,0,w,h);
        const d = idata.data;
        const bl = st.black;
        const br = st.bright;
        const temp = new Uint8ClampedArray(d);

        for (let i = 0; i < d.length; i += 4) {
            let gray = (d[i] + d[i+1] + d[i+2]) / 3 + br;
            if (st.style === 'dotwork') {
                let x = (i/4)%w, y = Math.floor((i/4)/w);
                let thr = ((x % 4) * 4 + (y % 4)) * 16;
                gray = gray < (bl * (thr/255)) ? 0 : 255;
            } else if (st.style === 'shades') {
                gray = gray < bl ? (gray < bl/2 ? 0 : 160) : 255;
            } else if (st.style === 'linework') {
                if(i > 4) {
                    let grayL = (temp[i-4] + temp[i-3] + temp[i-2]) / 3;
                    gray = Math.abs(gray - grayL) > (255 - bl) / 8 ? 0 : 255;
                }
            } else {
                gray = gray < bl ? 0 : 255;
            }
            d[i] = d[i+1] = d[i+2] = gray;
        }
        ctx.putImageData(idata, 0,0);
    }

    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelector('.grid-btn.active').classList.remove('active');
            btn.classList.add('active');
            st.grid = parseInt(btn.dataset.grid);
            updateGridUI();
        };
    });

    ['black','bright','size'].forEach(id => {
        $(id).oninput = e => { st[id] = parseFloat(e.target.value); render(); };
    });

    updateGridUI();
</script>
</body>
</html>
