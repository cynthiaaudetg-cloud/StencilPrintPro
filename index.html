<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maman Sokal | Gabarit Courbe Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { --neon-pink: #ff007a; --neon-blue: #00f2ff; --neon-yellow: #fff200; --bg: #0a0a0c; --card: rgba(16, 16, 26, 0.95); }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; }
body { background: var(--bg); color: #fff; padding-bottom: 70px; overflow-x: hidden; }

/* Styles du Logo et Header */
.header-wrap { display: flex; align-items: center; justify-content: center; gap: 15px; padding: 20px; border-bottom: 3px solid var(--neon-pink); background: #000; box-shadow: 0 0 15px var(--neon-pink); }
.studio-logo { height: 40px; width: auto; } /* Taille discrète pour le logo */
h1 { font-family: 'Rye'; color: #fff; text-shadow: 0 0 10px var(--neon-pink); font-size: 2rem; margin: 0; }

.main-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon-blue); }
.btn { padding: 12px; border-radius: 8px; border: 2px solid; font-weight: bold; text-transform: uppercase; cursor: pointer; text-align: center; }
.btn-img { color: var(--neon-pink); border-color: var(--neon-pink); background: transparent; }
.btn-exp { color: var(--neon-blue); border-color: var(--neon-blue); background: transparent; }

.settings-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #15151a; margin: 10px; border-radius: 12px; }
.s-group { display: flex; flex-direction: column; gap: 5px; background: #000; padding: 8px; border-radius: 8px; border: 1px solid #333; }
label { font-size: 0.6rem; color: var(--neon-yellow); text-transform: uppercase; display: flex; justify-content: space-between; }
input[type=range] { accent-color: var(--neon-pink); }
select { background: #000; color: #fff; border: 1px solid var(--neon-pink); padding: 5px; border-radius: 4px; font-size: 0.8rem; }

.preview-section { padding: 10px; text-align: center; }
.gabarit-container { position: relative; display: inline-grid; background: #111; border: 2px solid #444; margin: 0 auto; overflow: hidden; }
#gabaritCanvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.8; }
.leaf { border: 1px solid rgba(255, 255, 255, 0.2); position: relative; z-index: 2; pointer-events: none; }

.pages-list { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 20px; }
.canvas-wrap { background: white; position: relative; width: 90vw; max-width: 400px; box-shadow: 0 0 20px #000; }
.p-num { position: absolute; top: -22px; left: 0; color: var(--neon-blue); font-size: 0.7rem; font-weight: bold; }

/* Styles du Crédit en bas de page */
footer { text-align: center; font-size: 0.7rem; color: #666; padding: 15px; border-top: 1px solid #222; margin-top: 30px; letter-spacing: 1px; }

#modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; padding: 15px; flex-direction: column; overflow-y: auto; }
</style>
</head>
<body>

<div class="header-wrap">
    <img src="https://i.postimg.cc/CR9ZXgKy/CR9ZXgKy.png" alt="Sokalite Logo" class="studio-logo">
    <h1>Maman Sokal</h1>
</div>

<div class="main-controls">
    <label for="fIn" class="btn btn-img">✦ Charger</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-exp" id="btnExp" disabled>⬇ Exporter</button>
</div>

<div class="settings-panel">
    <div class="s-group"><label>Taille Image <span id="vSize">100%</span></label><input type="range" id="size" min="10" max="500" value="100"></div>
    <div class="s-group"><label>Marge (mm) <span id="vMarg">8</span></label><input type="range" id="marg" min="0" max="25" value="8"></div>
    <div class="s-group"><label>Noir <span id="vCont">100</span></label><input type="range" id="cont" min="50" max="250" value="100"></div>
    <div class="s-group"><label>Style</label><select id="mode"><option value="liner">Contours</option><option value="shades">Ombrages</option></select></div>
    
    <div class="s-group" style="grid-column: span 2;"><label>Courbe Anatomique <span id="vBend">0</span></label>
    <input type="range" id="bend" min="-100" max="100" value="0"></div>

    <div class="s-group" style="grid-column: span 2;"><label>Montage</label><select id="pages">
        <option value="1">1 Page</option><option value="4">4 Pages (2x2)</option>
        <option value="6">6 Pages (2x3)</option><option value="9">9 Pages (3x3)</option>
    </select></div>
</div>

<div class="preview-section">
    <p style="font-size: 0.7rem; color: var(--neon-yellow); margin-bottom: 10px;">APERÇU DU MONTAGE (GABARIT)</p>
    <div id="gabarit" class="gabarit-container">
        <canvas id="gabaritCanvas"></canvas>
    </div>
</div>

<div class="pages-list" id="zone"></div>

<footer>création par cynthia audet grondin artiste maman Sokal</footer>

<div id="modal">
    <button class="btn btn-img" style="margin-bottom:20px" onclick="$('modal').style.display='none'">✕ Retour</button>
    <div id="expList"></div>
</div>

<script>
let state = { img: null, size: 100, pages: 1, marg: 8, cont: 100, mode: 'liner', bend: 0 };
const $ = id => document.getElementById(id);
const A4W = 794, A4H = 1123;

$('fIn').onchange = (e) => {
    const r = new FileReader(); r.onload = (ev) => {
        const i = new Image(); i.onload = () => { state.img = i; $('btnExp').disabled = false; render(); };
        i.src = ev.target.result;
    }; r.readAsDataURL(e.target.files[0]);
};

['size','marg','cont','bend'].forEach(id => $(id).oninput = (e) => {
    state[id] = parseInt(e.target.value);
    $(id==='size'?'vSize':id==='marg'?'vMarg':id==='cont'?'vCont':'vBend').textContent = (id==='size'?e.target.value+'%':e.target.value);
    render();
});
$('mode').onchange = (e) => { state.mode = e.target.value; render(); };
$('pages').onchange = (e) => { state.pages = parseInt(e.target.value); render(); };

// FONCTION POUR COURBER L'IMAGE
function drawBentImage(ctx, img, x, y, width, height, bendAmount) {
    if (bendAmount === 0) {
        ctx.drawImage(img, x, y, width, height);
        return;
    }
    const sections = 40; 
    const sectionWidth = width / sections;
    for (let i = 0; i < sections; i++) {
        const sectionX = i * sectionWidth;
        const centerX = width / 2;
        const distFromCenter = (sectionX + sectionWidth / 2) - centerX;
        const normalizedDist = distFromCenter / (width / 2);
        const offset = Math.pow(normalizedDist, 2) * bendAmount;
        ctx.drawImage(img, (i * img.width) / sections, 0, img.width / sections, img.height, x + sectionX, y + offset, sectionWidth, height);
    }
}

function applyEffects(ctx) {
    const idat = ctx.getImageData(0,0,A4W,A4H);
    const d = idat.data;
    const f = (259 * (state.cont + 255)) / (255 * (259 - state.cont));
    for (let j=0; j<d.length; j+=4) {
        if (d[j] > 250 && d[j+1] > 250 && d[j+2] > 250) { d[j]=d[j+1]=d[j+2]=255; continue; }
        let avg = (d[j]+d[j+1]+d[j+2])/3;
        let res = f * (avg - 128) + 128;
        let v = state.mode==='shades' ? (res < 180 && res < Math.random()*255 ? 0 : 255) : (res < 128 ? 0 : 255);
        d[j]=d[j+1]=d[j+2]=v;
    }
    ctx.putImageData(idat, 0, 0);
}

function render() {
    if(!state.img) return;
    const zone = $('zone'); zone.innerHTML = '';
    const gab = $('gabarit'); const gCanvas = $('gabaritCanvas');
    Array.from(gab.getElementsByClassName('leaf')).forEach(l => l.remove());

    let cols = state.pages === 1 ? 1 : (state.pages <= 6 ? 2 : 3);
    let rows = Math.ceil(state.pages / cols);
    const mPx = state.marg * 3.78;
    const uW = A4W - mPx*2, uH = A4H - mPx*2;
    const totalW = uW * cols * (state.size/100);
    const totalH = totalW * (state.img.height / state.img.width);

    // 1. APERÇU GABARIT
    const s = 0.22;
    gab.style.gridTemplateColumns = `repeat(${cols}, ${uW * s}px)`;
    gab.style.height = (uH * rows * s) + "px";
    for(let i=0; i<state.pages; i++) {
        let l = document.createElement('div'); l.className = 'leaf';
        l.style.width = (uW * s) + "px"; l.style.height = (uH * s) + "px";
        gab.appendChild(l);
    }
    gCanvas.width = uW * cols * s; gCanvas.height = uH * rows * s;
    const gCtx = gCanvas.getContext('2d');
    drawBentImage(gCtx, state.img, (gCanvas.width - totalW*s)/2, (gCanvas.height - totalH*s)/2, totalW*s, totalH*s, state.bend * s * 2);

    // 2. PAGES INDIVIDUELLES
    for(let i=0; i<state.pages; i++) {
        const wrap = document.createElement('div'); wrap.className = 'canvas-wrap';
        const cv = document.createElement('canvas'); cv.width = A4W; cv.height = A4H; cv.style.width = "100%";
        const ctx = cv.getContext('2d');
        ctx.fillStyle = "white"; ctx.fillRect(0,0,A4W,A4H);
        
        const col = i % cols, row = Math.floor(i / cols);
        ctx.save();
        ctx.rect(mPx, mPx, uW, uH); ctx.clip();
        
        const drawX = mPx + (uW * cols - totalW)/2 - (col * uW);
        const drawY = mPx + (uH * rows - totalH)/2 - (row * uH);
        drawBentImage(ctx, state.img, drawX, drawY, totalW, totalH, state.bend * 2);
        
        applyEffects(ctx);
        ctx.restore();
        wrap.innerHTML = `<div class="p-num">PAGE ${i+1}</div>`;
        wrap.appendChild(cv); zone.appendChild(wrap);
    }
}

$('btnExp').onclick = () => {
    const l = $('expList'); l.innerHTML = '';
    document.querySelectorAll('.canvas-wrap canvas').forEach((c, idx) => {
        const img = new Image(); img.src = c.toDataURL(); img.style.width="100%";
        const b = document.createElement('button'); b.className="btn btn-exp"; b.style.width="100%";
        b.textContent = "Page "+(idx+1);
        b.onclick = () => { let w = window.open(""); w.document.write("<img src='"+img.src+"'>"); };
        l.appendChild(img); l.appendChild(b);
    });
    $('modal').style.display = 'flex';
};
</script>
</body>
</html>
