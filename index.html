<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Fix Centrage & Marges 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; }
        body { background: var(--dark); color: #eee; padding-bottom: 50px; }
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }
        
        .grid-selector { display: flex; gap: 4px; padding: 10px; overflow-x: auto; background: #000; }
        .grid-btn { flex: 0 0 22%; padding: 10px; background: #111; border: 1px solid var(--pink); color: #fff; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
        .grid-btn.active { background: var(--pink); color: #000; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; }
        .adj-row { display: flex; align-items: center; gap: 5px; }
        .plus-minus { background: #000; color: #fff; border: 1px solid var(--pink); padding: 8px 12px; border-radius: 4px; font-weight: 700; }
        input[type=range] { flex: 1; accent-color: var(--pink); height: 30px; }

        .btn-auto { background: var(--pink); color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }

        .preview-container { background: #111; padding: 20px; overflow: auto; display: flex; flex-direction: column; align-items: center; }
        .pages-wrapper { display: grid; gap: 20px; background: #222; padding: 20px; border-radius: 4px; }
        .a4-page { background: white; width: 210px; height: 297px; box-shadow: 0 0 15px rgba(0,0,0,0.8); position: relative; }
        canvas { width: 100%; height: 100%; display: block; }

        .safe-guide { 
            position: absolute; border: 1px dashed red; 
            pointer-events: none; z-index: 10; 
            display: block; /* Visible par défaut */
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.1rem;">STENCIL PRINT PRO</h1>
    <div style="color: var(--pink); font-size: 0.8rem;">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ IMPORTER</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">RESET</button>
    <button class="btn btn-exp" id="btnExp">EXPORTER A4 SEP.</button>
</div>

<div class="grid-selector">
    <button class="grid-btn" data-grid="1">1 PAGE</button>
    <button class="grid-btn active" data-grid="2">2 (1x2)</button>
    <button class="grid-btn" data-grid="4">4 (2x2)</button>
    <button class="grid-btn" data-grid="6">6 (2x3)</button>
    <button class="grid-btn" data-grid="9">9 (3x3)</button>
    <button class="grid-btn" data-grid="12">12 (3x4)</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <button class="btn-auto" onclick="autoFit()">🎯 AJUSTER & CENTRER AU GABARIT</button>
        <label>ZONE SÉCURITÉ (MARGE) : <span id="vMargin">10mm</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('margin', -1)">-</button>
            <input type="range" id="margin" min="0" max="30" value="10">
            <button class="plus-minus" onclick="adj('margin', 1)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>TAILLE IMAGE <span id="vSize">100%</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('size', -10)">-</button>
            <input type="range" id="size" min="10" max="1000" value="100">
            <button class="plus-minus" onclick="adj('size', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>NOIR / CONTRASTE <span id="vBlack">128</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('black', -10)">-</button>
            <input type="range" id="black" min="1" max="254" value="128">
            <button class="plus-minus" onclick="adj('black', 10)">+</button>
        </div>
    </div>

    <div class="panel full">
        <label>AFFICHER LES POINTILLÉS ROUGES</label>
        <select onchange="toggleGuides(this.value)" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #444;">
            <option value="block">OUI (VISIBLE)</option>
            <option value="none">NON (MASQUÉ)</option>
        </select>
    </div>
</div>

<div class="preview-container">
    <div class="pages-wrapper" id="pagesWrapper"></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let img = null;
    let st = { size: 100, black: 128, grid: 2, margin: 10, x:0, y:0 };

    function updateGridUI() {
        const wrapper = $('pagesWrapper');
        wrapper.innerHTML = '';
        let cols = (st.grid === 2 || st.grid === 4) ? 2 : (st.grid >= 6 ? 3 : 1);
        wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        for(let i=0; i < st.grid; i++) {
            const page = document.createElement('div');
            page.className = 'a4-page';
            // Recréation du guide pointillé
            const guide = document.createElement('div');
            guide.className = 'safe-guide';
            guide.id = `guide-${i}`;
            
            page.appendChild(guide);
            page.innerHTML += `<canvas id="cv-${i}"></canvas>`;
            wrapper.appendChild(page);
        }
        updateMarginsUI();
        render();
    }

    function updateMarginsUI() {
        const guides = document.querySelectorAll('.safe-guide');
        guides.forEach(g => {
            g.style.top = g.style.left = st.margin + 'px';
            g.style.width = `calc(100% - ${st.margin * 2}px)`;
            g.style.height = `calc(100% - ${st.margin * 2}px)`;
        });
        $('vMargin').textContent = st.margin + 'mm';
    }

    function toggleGuides(val) {
        document.querySelectorAll('.safe-guide').forEach(g => g.style.display = val);
    }

    function autoFit() {
        if(!img) return;
        st.x = 0; st.y = 0;
        let cols = (st.grid === 2 || st.grid === 4) ? 2 : (st.grid >= 6 ? 3 : 1);
        st.size = (cols * 100) - (st.margin * 2.5); // Ajustement proportionnel aux marges
        $('size').value = st.size;
        render();
    }

    function render() {
        if(!img) return;
        const canvases = document.querySelectorAll('canvas');
        const A4_W = 2480, A4_H = 3508;
        const SAFE_PX = st.margin * 11.8; // Conversion mm vers px 300dpi
        const PRINT_W = A4_W - (SAFE_PX * 2);
        const PRINT_H = A4_H - (SAFE_PX * 2);

        let cols = (st.grid === 2 || st.grid === 4) ? 2 : (st.grid >= 6 ? 3 : 1);
        const rows = Math.ceil(st.grid / cols);

        canvases.forEach((cv, i) => {
            cv.width = A4_W; cv.height = A4_H;
            const ctx = cv.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,A4_W,A4_H);

            const colIdx = i % cols;
            const rowIdx = Math.floor(i / cols);

            ctx.save();
            ctx.beginPath();
            ctx.rect(SAFE_PX, SAFE_PX, PRINT_W, PRINT_H);
            ctx.clip();

            ctx.translate(SAFE_PX, SAFE_PX);
            ctx.translate(-colIdx * PRINT_W, -rowIdx * PRINT_H);
            ctx.translate((cols * PRINT_W)/2 + st.x, (rows * PRINT_H)/2 + st.y);

            let dw = PRINT_W * (st.size/100), dh = dw * (img.height/img.width);
            ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
            ctx.restore();

            const idata = ctx.getImageData(0,0,A4_W,A4_H);
            const d = idata.data;
            for (let j = 0; j < d.length; j += 4) {
                let g = (d[j] + d[j+1] + d[j+2]) / 3;
                let v = g < st.black ? 0 : 255;
                d[j] = d[j+1] = d[j+2] = v;
            }
            ctx.putImageData(idata, 0, 0);
        });
        $('vSize').textContent = Math.round(st.size) + "%";
        $('vBlack').textContent = st.black;
    }

    $('fIn').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            img = new Image();
            img.onload = () => autoFit();
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function adj(id, delta) {
        let val = parseFloat($(id).value) + delta;
        $(id).value = val;
        st[id] = val;
        if(id === 'margin') updateMarginsUI();
        render();
    }

    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelector('.grid-btn.active').classList.remove('active');
            btn.classList.add('active');
            st.grid = parseInt(btn.dataset.grid);
            updateGridUI();
        };
    });

    $('btnExp').onclick = () => {
        document.querySelectorAll('canvas').forEach((cv, i) => {
            const link = document.createElement('a');
            link.download = `Stencil_Sokal_P${i+1}.png`;
            link.href = cv.toDataURL('image/png');
            link.click();
        });
    };

    updateGridUI();
</script>
</body>
</html>
