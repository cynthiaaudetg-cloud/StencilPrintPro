<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Sokal Master Ultra 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--dark); color: #eee; padding-bottom: 30px; }

        /* HEADER & SIGNATURE MOBILE */
        header { padding: 10px 15px; text-align: left; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; font-weight: 700; text-transform: uppercase; }
        .sig-header { color: var(--pink); font-size: 0.9rem; font-weight: 500; letter-spacing: 0.5px; }

        /* BARRE D'OUTILS PRINCIPALE MOBILE (STICKY) */
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; transition: 0.2s; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }

        /* ZONE DES GABARITS (Portrait/Pages) : Gros boutons clairs sous la toolbar */
        .gabarit-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #111; border-bottom: 1px solid #2d2d44; }
        .gabarit-panel { display: flex; flex-direction: column; gap: 5px; }
        .sub-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* Style Segmented Control MOBILE */
        .segmented-control { display: flex; background: #000; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
        .seg-btn { flex: 1; padding: 8px; font-size: 0.75rem; font-weight: 600; text-align: center; color: #aaa; border: none; background: transparent; cursor: pointer; transition: 0.2s; }
        .seg-btn-active { background: var(--pink); color: #000 !important; }

        /* GRILLE DES CONTRÔLES MOINS HAUTE */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; font-weight: 500; }
        label span { color: var(--green); font-weight: 600; }

        /* SLIDERS MOBILES */
        input[type=range] { width: 100%; accent-color: var(--pink); height: 25px; cursor: pointer; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 7px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; }

        /* D-PAD MOBILE ULTRA-RÉACTIF */
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 100px; margin: 0 auto; }
        .dp-btn { background: #000; border: 1px solid #333; color: var(--cyan); padding: 8px; border-radius: 5px; font-size: 1rem; border: none; outline: none; transition: background 0.1s; }
        .dp-btn:active { background: #333; color: #fff; } /* Feedback tactile */
        .dp-active { color: var(--green); border-color: var(--green); }

        /* ZONE D'APERÇU SANS MARGES EXCESSIVES */
        .canvas-area { margin-top: 10px; padding: 5px; background: #000; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #2d2d44; overflow: hidden; }
        canvas { background: #fff; max-width: 100%; height: auto; display: block; border: 1px solid #555; }
        .info-mobile { color: #888; font-size: 0.7rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

    </style>
</head>
<body>

<header>
    <h1>Stencil Pro Masters</h1>
    <div class="sig-header">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" id="btnReset">Effacer</button>
    <button class="btn btn-exp" id="btnExp">Exporter HR</button>
</div>

<div class="gabarit-zone">
    <div class="gabarit-panel">
        <div class="sub-label">1. Orientation Page</div>
        <div class="segmented-control" id="ctrlOrient">
            <button class="seg-btn seg-btn-active" data-value="p">Portrait</button>
            <button class="seg-btn" data-value="l">Paysage</button>
        </div>
    </div>
    <div class="gabarit-panel">
        <div class="sub-label">2. Montage A4</div>
        <div class="segmented-control" id="ctrlPages">
            <button class="seg-btn seg-btn-active" data-value="1">1</button>
            <button class="seg-btn" data-value="2">2</button>
            <button class="seg-btn" data-value="4">4</button>
            <button class="seg-btn" data-value="6">6</button>
            <button class="seg-btn" data-value="12">12</button>
        </div>
    </div>
</div>

<div class="control-grid">
    <div class="panel full">
        <label>Mode Tatouage</label>
        <select id="renderStyle">
            <option value="original">PHOTO ORIGINAL (Ajustable)</option>
            <option value="shades">RÉALISME (Ombrages & Gris)</option>
            <option value="bold">CONTOURS NETS (Livre Coloriage Pro)</option>
        </select>
    </div>

    <div class="panel">
        <label>Zone Morte (Marges)</label>
        <select id="removeMargins">
            <option value="no">GARDER LES MARGES</option>
            <option value="yes">ZONE MORTE RÉDUITE (Scan)</option>
        </select>
    </div>
    <div class="panel">
        <label>Vider le Noir Total</label>
        <select id="removeFill">
            <option value="no">NON (Garder)</option>
            <option value="yes">OUI (Squelette)</option>
        </select>
    </div>

    <div class="panel">
        <label>Rotation <span id="vRot">0</span>°</label>
        <input type="range" id="rotation" min="0" max="360" value="0">
    </div>
    <div class="panel">
        <label>Noir / Tracé <span id="vBlack">128</span></label>
        <input type="range" id="black" min="0" max="255" value="128">
    </div>

    <div class="panel">
        <label>Zoom Aperçu <span id="vZoom">55%</span></label>
        <input type="range" id="zoom" min="10" max="100" value="55">
    </div>
    <div class="panel">
        <label>Taille Image <span id="vSize">100%</span></label>
        <input type="range" id="size" min="10" max="250" value="100">
    </div>

    <div class="panel">
        <label>Miroir</label>
        <select id="mirror">
            <option value="no">Désactivé</option>
            <option value="yes">Activé (Transfert)</option>
        </select>
    </div>
    <div class="panel full">
        <label>Position Précise (D-Pad)</label>
        <div class="d-pad" style="margin-top:10px">
            <div></div><button class="dp-btn" data-dx="0" data-dy="-20">▲</button><div></div>
            <button class="dp-btn" data-dx="-20" data-dy="0">◀</button>
            <button class="dp-btn dp-center" data-dx="0" data-dy="0">◎</button>
            <button class="dp-btn" data-dx="20" data-dy="0">▶</button>
            <div></div><button class="dp-btn" data-dx="0" data-dy="20">▼</button><div></div>
        </div>
    </div>
</div>

<div class="canvas-area">
    <div class="info-mobile">Gabarit d'impression (300 DPI)</div>
    <canvas id="gCanvas"></canvas>
</div>

<script>
    const $ = id => document.getElementById(id);
    const cv = $('gCanvas'), ctx = cv.getContext('2d');
    let img = null;
    let st = { x:0, y:0, size:100, black:128, style:'original', mirror:'no', pages:1, zoom:55, orient:'p', rot:0, noFill:'no' };

    $('fIn').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { 
            img = new Image(); 
            img.onload = () => { render(); };
            img.src = ev.target.result; 
        };
        r.readAsDataURL(e.target.files[0]);
    };

    // GESTION SEGMENTED CONTROL (Portrait/Pages) MOBILE
    function setupSegmented(containerId, stateKey) {
        const container = $(containerId);
        container.querySelectorAll('.seg-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                container.querySelector('.seg-btn-active').classList.remove('seg-btn-active');
                btn.classList.add('seg-btn-active');
                st[stateKey] = btn.dataset.value;
                render();
            });
        });
    }
    setupSegmented('ctrlOrient', 'orient');
    setupSegmented('ctrlPages', 'pages');

    // D-PAD MOBILE ULTRA-RÉACTIF CORRIGÉ (DÉLAI SUPPRIMÉ)
    document.querySelectorAll('.dp-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const dx = parseInt(btn.dataset.dx);
            const dy = parseInt(btn.dataset.dy);
            if(dx === 0 && dy === 0) { st.x = 0; st.y = 0; }
            else { st.x += dx; st.y += dy; }
            render();
        });
    });

    $('btnReset').onclick = () => location.reload();

    function render() {
        if(!img) return;
        const A4W = st.orient === 'p' ? 794 : 1123;
        const A4H = st.orient === 'p' ? 1123 : 794;
        const p = parseInt(st.pages);
        
        let cols, rows;
        if (p === 2) { cols = 2; rows = 1; }
        else if (p === 6) { cols = 3; rows = 2; }
        else if (p === 12) { cols = 3; rows = 4; }
        else { cols = Math.ceil(Math.sqrt(p)); rows = Math.ceil(p / cols); }
        
        cv.width = A4W * cols; cv.height = A4H * rows;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,cv.width,cv.height);
        
        ctx.save();
        ctx.translate(cv.width/2 + st.x, cv.height/2 + st.y);
        ctx.rotate(st.rot * Math.PI / 180);
        if(st.mirror === 'yes') ctx.scale(-1, 1);
        
        let dw = cv.width * (st.size/100);
        let dh = dw * (img.height/img.width);
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        if (st.style !== 'original' || st.noFill === 'yes') processImage();

        // Grille de découpe
        ctx.strokeStyle = "rgba(255, 0, 122, 0.5)";
        ctx.lineWidth = 2; ctx.setLineDash([10, 5]);
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) ctx.strokeRect(c*A4W, r*A4H, A4W, A4H);
        }
        
        cv.style.width = st.zoom + "%";
        $('vBlack').textContent = st.black; $('vZoom').textContent = st.zoom + "%";
        $('vSize').textContent = st.size + "%"; $('vRot').textContent = st.rot;
    }

    function processImage() {
        const idat = ctx.getImageData(0,0,cv.width,cv.height);
        const d = idat.data, w = cv.width;
        const temp = new Uint8ClampedArray(d);

        for (let i = 0; i < d.length; i += 4) {
            let v = (temp[i]+temp[i+1]+temp[i+2])/3;
            
            // Correction de l'image originale ajustable
            if(st.style === 'original') {
                let factor = (st.black / 128);
                d[i] = Math.min(255, temp[i] * factor);
                d[i+1] = Math.min(255, temp[i+1] * factor);
                d[i+2] = Math.min(255, temp[i+2] * factor);
            } 
            // CORRECTION MODE COLORIAGE PRO (NET & DÉFINI)
            else if(st.style === 'bold') {
                const x = (i/4)%w;
                if(x > 0) {
                    let vLeft = (temp[i-4]+temp[i-3]+temp[i-2])/3;
                    let diff = Math.abs(v - vLeft);
                    d[i] = d[i+1] = d[i+2] = diff > (255 - st.black)/6 ? 0 : 255;
                }
            } 
            else if(st.style === 'shades') {
                let res = v < st.black ? (v < st.black/2 ? 0 : 180) : 255;
                d[i] = d[i+1] = d[i+2] = res;
            }

            // Bouton "Vider le noir totalement" (Squelette)
            if(st.noFill === 'yes' && d[i] < 128) {
                // On vide le noir intérieur, on ne garde que le contour
                d[i] = d[i+1] = d[i+2] = 255; 
                if(i > 4 && d[i-4] > 200) d[i-4]=d[i-3]=d[i-2]=0; // Ajoute un contour fin
            }
        }
        ctx.putImageData(idat, 0,0);
    }

    $('renderStyle').onchange = (e) => { st.style = e.target.value; render(); };
    $('removeFill').onchange = (e) => { st.noFill = e.target.value; render(); };
    $('black').oninput = (e) => { st.black = e.target.value; render(); };
    $('rotation').oninput = (e) => { st.rot = e.target.value; render(); };
    $('zoom').oninput = (e) => { st.zoom = e.target.value; render(); };
    $('size').oninput = (e) => { st.size = e.target.value; render(); };
    $('mirror').onchange = (e) => { st.mirror = e.target.value; render(); };
</script>
</body>
</html>
