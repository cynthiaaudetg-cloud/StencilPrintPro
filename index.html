<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STENCIL PRO MASTERS 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 50px; }
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; color: #fff; text-transform: uppercase; }
        .maman-sokal { color: var(--pink); font-size: 0.9rem; }
        
        .main-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px; background: #000; position: sticky; top: 0; z-index: 100; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }

        .grid-header { padding: 10px; color: var(--cyan); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }
        .grid-selector { display: flex; gap: 5px; padding: 0 10px 10px; overflow-x: auto; }
        .grid-btn { flex: 1; padding: 10px; background: #222; border: 1px solid var(--pink); color: #fff; border-radius: 4px; font-size: 0.85rem; cursor: pointer; min-width: 50px; }
        .grid-btn.active { background: var(--pink); color: #000; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        
        label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; font-weight: 600; }
        .adj-row { display: flex; align-items: center; gap: 5px; }
        .plus-minus { background: #000; color: #fff; border: 1px solid var(--pink); padding: 10px; border-radius: 5px; font-weight: 700; font-size: 1.1rem; min-width: 42px; cursor: pointer; }
        .btn-auto { background: var(--pink); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 700; width: 100%; text-transform: uppercase; margin-top: 5px; cursor: pointer; }
        
        input[type=range] { flex: 1; accent-color: var(--pink); }

        .preview-container { background: #111; padding: 20px; overflow-x: auto; display: flex; justify-content: center; }
        .pages-wrapper { display: grid; gap: 15px; background: #333; padding: 20px; border-radius: 4px; }
        .a4-page { 
            background: white; 
            position: relative; 
            width: 210px; height: 297px; /* Échelle visuelle mobile */
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        .margin-guide {
            position: absolute;
            top: 7mm; left: 7mm; right: 7mm; bottom: 7mm;
            border: 1px dashed rgba(255, 0, 0, 0.4);
            pointer-events: none; z-index: 10;
        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 120px; margin: 10px auto; }
        .dp-btn { background: #000; border: 1px solid #333; color: var(--cyan); padding: 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>STENCIL PRO MASTERS</h1>
    <div class="maman-sokal">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ IMPORTER</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">EFFACER</button>
    <button class="btn btn-exp" id="btnExp">EXPORTER TOUT</button>
</div>

<div class="grid-header">NOMBRE DE PAGES (GABARIT A4)</div>
<div class="grid-selector" id="gridSelect">
    <button class="grid-btn active" data-grid="1">1</button>
    <button class="grid-btn" data-grid="2">2</button>
    <button class="grid-btn" data-grid="4">4</button>
    <button class="grid-btn" data-grid="6">6</button>
    <button class="grid-btn" data-grid="9">9</button>
    <button class="grid-btn" data-grid="12">12</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <button class="btn-auto" onclick="autoFit()">🎯 AJUSTER AUX MARGES SÉCURISÉES</button>
    </div>

    <div class="panel full">
        <label>NETTETÉ <span id="vSharp">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('sharp', -5)">-</button>
            <input type="range" id="sharp" min="0" max="100" value="0">
            <button class="plus-minus" onclick="adj('sharp', 5)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>CONTRASTE <span id="vBlack">128</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('black', -10)">-</button>
            <input type="range" id="black" min="0" max="255" value="128">
            <button class="plus-minus" onclick="adj('black', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>LUMINOSITÉ <span id="vBright">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('bright', -10)">-</button>
            <input type="range" id="bright" min="-100" max="100" value="0">
            <button class="plus-minus" onclick="adj('bright', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>TAILLE IMAGE <span id="vSize">90%</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('size', -10)">-</button>
            <input type="range" id="size" min="5" max="500" value="90">
            <button class="plus-minus" onclick="adj('size', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>MIROIR (STENCIL)</label>
        <select id="mirror" onchange="st.mirror=parseInt(this.value);render()">
            <option value="1">NON</option>
            <option value="-1">OUI</option>
        </select>
    </div>

    <div class="panel full">
        <label>POSITION (D-PAD)</label>
        <div class="d-pad">
            <div></div><button class="dp-btn" onclick="move(0,-80)">▲</button><div></div>
            <button class="dp-btn" onclick="move(-80,0)">◀</button>
            <button class="dp-btn" onclick="st.x=0;st.y=0;render()">◎</button>
            <button class="dp-btn" onclick="move(80,0)">▶</button>
            <div></div><button class="dp-btn" onclick="move(0,80)">▼</button><div></div>
        </div>
    </div>
</div>

<div class="preview-container">
    <div class="pages-wrapper" id="pagesWrapper"></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let img = null;
    let st = { x:0, y:0, size:90, black:128, bright:0, sharp:0, mirror:1, grid:1 };
    const wrapper = $('pagesWrapper');

    function updateGridUI() {
        wrapper.innerHTML = '';
        const cols = st.grid <= 2 ? st.grid : (st.grid === 4 ? 2 : 3);
        wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        for(let i=0; i < st.grid; i++) {
            const page = document.createElement('div');
            page.className = 'a4-page';
            page.innerHTML = `<div class="margin-guide"></div><canvas id="cv-${i}"></canvas>`;
            wrapper.appendChild(page);
        }
        render();
    }

    function autoFit() {
        st.x = 0; st.y = 0;
        st.size = 85; // Taille de sécurité pour entrer dans les marges
        $('size').value = 85;
        render();
    }

    $('fIn').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            img = new Image();
            img.onload = () => { autoFit(); };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function adj(id, delta) {
        let val = parseFloat($(id).value) + delta;
        $(id).value = val;
        st[id] = val;
        render();
    }

    function move(dx, dy) { st.x += dx; st.y += dy; render(); }

    function render() {
        if(!img) return;
        const canvases = document.querySelectorAll('canvas');
        const A4_W = 1240, A4_H = 1754;
        const cols = st.grid <= 2 ? st.grid : (st.grid === 4 ? 2 : 3);

        canvases.forEach((cv, i) => {
            cv.width = A4_W; cv.height = A4_H;
            const ctx = cv.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,A4_W,A4_H);
            
            ctx.save();
            const colIdx = i % cols;
            const rowIdx = Math.floor(i / cols);
            
            ctx.translate(-colIdx * A4_W + A4_W/2 + st.x, -rowIdx * A4_H + A4_H/2 + st.y);
            ctx.scale(st.mirror, 1);
            
            let dw = A4_W * (st.size/100), dh = dw * (img.height/img.width);
            ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
            ctx.restore();
            
            const idata = ctx.getImageData(0,0,A4_W,A4_H), d = idata.data;
            for (let j = 0; j < d.length; j += 4) {
                let gray = (d[j] + d[j+1] + d[j+2]) / 3 + parseInt(st.bright);
                gray = gray < st.black ? 0 : 255;
                d[j] = d[j+1] = d[j+2] = gray;
            }
            ctx.putImageData(idata, 0,0);
        });
        updateLabels();
    }

    function updateLabels() {
        $('vSharp').textContent = st.sharp;
        $('vBlack').textContent = st.black;
        $('vBright').textContent = st.bright;
        $('vSize').textContent = st.size + "%";
    }

    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelector('.grid-btn.active').classList.remove('active');
            btn.classList.add('active');
            st.grid = parseInt(btn.dataset.grid);
            updateGridUI();
        };
    });

    ['sharp','black','bright','size'].forEach(id => {
        $(id).oninput = e => { st[id] = parseFloat(e.target.value); render(); };
    });

    updateGridUI();
</script>
</body>
</html>
