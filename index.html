<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Sokal Zero-Loss 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 30px; }
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; font-weight: 700; text-transform: uppercase; }
        .sig-header { color: var(--pink); font-size: 0.9rem; font-weight: 500; }
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; font-weight: 500; }
        .adj-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .plus-minus { background: #000; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; font-weight: 700; font-size: 1.1rem; min-width: 40px; cursor: pointer; }
        input[type=range] { flex: 1; accent-color: var(--pink); height: 30px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 0.8rem; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 100px; margin: 5px auto; }
        .dp-btn { background: #000; border: 1px solid #333; color: var(--cyan); padding: 8px; border-radius: 5px; }
        .canvas-area { margin-top: 10px; padding: 5px; background: #000; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #2d2d44; }
        canvas { background: #fff; max-width: 100%; height: auto; display: block; border: 1px solid #555; }
    </style>
</head>
<body>

<header>
    <h1>Stencil Pro Masters</h1>
    <div class="sig-header">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">Reset</button>
    <button class="btn btn-exp" id="btnExp">Exporter</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <label>Rendu & Gabarit</label>
        <div style="display:flex; gap:5px;">
            <select id="renderStyle">
                <option value="original" selected>IMAGE ORIGINALE</option>
                <option value="bold">CONTOURS NETS</option>
                <option value="dotwork">POINTILLISME</option>
                <option value="shades">RÉALISME</option>
            </select>
            <select id="pages">
                <option value="1">1 PAGE</option>
                <option value="4">4 PAGES (2x2)</option>
                <option value="9">9 PAGES (3x3)</option>
            </select>
        </div>
    </div>

    <div class="panel full">
        <label>Marge de Sécurité (Rebords) <span id="vMargin">20px</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('safeMargin', -5)">-</button>
            <input type="range" id="safeMargin" min="0" max="100" value="20">
            <button class="plus-minus" onclick="adj('safeMargin', 5)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Netteté <span id="vSharp">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('sharp', -5)">-</button>
            <input type="range" id="sharp" min="0" max="100" value="0">
            <button class="plus-minus" onclick="adj('sharp', 5)">+</button>
        </div>
    </div>
    <div class="panel">
        <label>Lumière <span id="vBright">0</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('bright', -10)">-</button>
            <input type="range" id="bright" min="-100" max="100" value="0">
            <button class="plus-minus" onclick="adj('bright', 10)">+</button>
        </div>
    </div>

    <div class="panel">
        <label>Précision <span id="vBlack">128</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('black', -10)">-</button>
            <input type="range" id="black" min="0" max="255" value="128">
            <button class="plus-minus" onclick="adj('black', 10)">+</button>
        </div>
    </div>
    <div class="panel">
        <label>Taille <span id="vSize">100%</span></label>
        <div class="adj-row">
            <button class="plus-minus" onclick="adj('size', -5)">-</button>
            <input type="range" id="size" min="10" max="300" value="100">
            <button class="plus-minus" onclick="adj('size', 5)">+</button>
        </div>
    </div>

    <div class="panel full">
        <label>Centrer le dessin</label>
        <div class="d-pad">
            <div></div><button class="dp-btn" onclick="move(0,-20)">▲</button><div></div>
            <button class="dp-btn" onclick="move(-20,0)">◀</button>
            <button class="dp-btn" onclick="st.x=0;st.y=0;render()">◎</button>
            <button class="dp-btn" onclick="move(20,0)">▶</button>
            <div></div><button class="dp-btn" onclick="move(0,20)">▼</button><div></div>
        </div>
    </div>
</div>

<div class="canvas-area">
    <canvas id="gCanvas"></canvas>
</div>

<script>
    const $ = id => document.getElementById(id);
    const cv = $('gCanvas'), ctx = cv.getContext('2d');
    let img = null;
    let st = { x:0, y:0, size:100, black:128, bright:0, sharp:0, style:'original', pages:1, safeMargin:20 };

    $('fIn').onchange = e => {
        const r = new FileReader();
        r.onload = ev => { img = new Image(); img.onload = render; img.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    function adj(id, delta) {
        $(id).value = parseFloat($(id).value) + delta;
        st[id] = parseFloat($(id).value);
        render();
    }
    function move(dx, dy) { st.x += dx; st.y += dy; render(); }

    function render() {
        if(!img) return;
        const A4W = 794, A4H = 1123;
        const cols = st.pages == 1 ? 1 : (st.pages == 4 ? 2 : 3);
        const rows = cols;
        cv.width = A4W * cols; cv.height = A4H * rows;
        
        ctx.fillStyle = "white"; ctx.fillRect(0,0,cv.width,cv.height);
        
        ctx.save();
        ctx.translate(cv.width/2 + st.x, cv.height/2 + st.y);
        let dw = cv.width * (st.size/100), dh = dw * (img.height/img.width);
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        processImage();

        // Dessin des marges de sécurité
        ctx.strokeStyle = "rgba(255,0,122,0.3)";
        ctx.setLineDash([10, 10]);
        for(let c=0; c<cols; c++) {
            for(let r=0; r<rows; r++) {
                ctx.strokeRect(c*A4W + st.safeMargin, r*A4H + st.safeMargin, A4W - (st.safeMargin*2), A4H - (st.safeMargin*2));
            }
        }
        
        $('vBright').textContent = st.bright; $('vSharp').textContent = st.sharp;
        $('vBlack').textContent = st.black; $('vSize').textContent = st.size + "%";
        $('vMargin').textContent = st.safeMargin + "px";
    }

    function processImage() {
        const idat = ctx.getImageData(0,0,cv.width,cv.height), d = idat.data, w = cv.width;
        const b = parseInt(st.bright), s = parseFloat(st.sharp)/10;
        const temp = new Uint8ClampedArray(d);

        for (let i = 0; i < d.length; i += 4) {
            let gray = (temp[i] + temp[i+1] + temp[i+2]) / 3;
            if(s > 0 && i > w*4 && i < d.length - w*4) {
                let neighbor = (temp[i-w*4] + temp[i+w*4] + temp[i-4] + temp[i+4]) / 4;
                gray = gray + (gray - neighbor) * s;
            }
            gray = gray + b;

            if(st.style === 'bold') {
                let vL = (i > 4) ? (temp[i-4]+temp[i-3]+temp[i-2])/3 : gray;
                d[i] = d[i+1] = d[i+2] = Math.abs(gray - vL) > (255 - st.black) / 5 ? 0 : 255;
            } else if(st.style === 'dotwork') {
                let x = (i/4)%w, y = Math.floor((i/4)/w);
                let thr = ((x % 4) * 4 + (y % 4)) * 16;
                d[i] = d[i+1] = d[i+2] = gray < (st.black * (thr/255)) ? 0 : 255;
            } else if(st.style === 'shades') {
                d[i] = d[i+1] = d[i+2] = gray < st.black ? (gray < st.black/2 ? 0 : 180) : 255;
            } else {
                d[i] = d[i+1] = d[i+2] = Math.max(0, Math.min(255, gray));
            }
        }
        ctx.putImageData(idat, 0,0);
    }

    $('safeMargin').oninput = e => { st.safeMargin = parseFloat(e.target.value); render(); };
    $('bright').oninput = e => { st.bright = e.target.value; render(); };
    $('sharp').oninput = e => { st.sharp = e.target.value; render(); };
    $('black').oninput = e => { st.black = e.target.value; render(); };
    $('size').oninput = e => { st.size = e.target.value; render(); };
    $('renderStyle').onchange = e => { st.style = e.target.value; render(); };
    $('pages').onchange = e => { st.pages = e.target.value; render(); };
    $('btnExp').onclick = () => {
        const link = document.createElement('a');
        link.download = 'Stencil_Sokal_Master.png';
        link.href = cv.toDataURL(); link.click();
    };
</script>
</body>
</html>
