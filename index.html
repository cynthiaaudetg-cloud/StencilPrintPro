<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stencil Print Pro | Maman Sokal Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { --neon-pink: #ff007a; --neon-blue: #00f2ff; --neon-yellow: #fff200; --bg: #050505; --card: rgba(16, 16, 26, 0.95); }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
body { background: var(--bg); color: #fff; font-family: 'Oswald', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

header { padding: 25px; text-align: center; border-bottom: 4px solid var(--neon-pink); background: var(--card); box-shadow: 0 0 25px var(--neon-pink); }
h1 { font-family: 'Rye', cursive; font-size: 2.4rem; text-shadow: 0 0 10px var(--neon-pink); animation: neonPulse 1s infinite alternate; }
@keyframes neonPulse { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 20px var(--neon-pink); } }
.subtitle { font-size: 0.75rem; letter-spacing: 5px; color: var(--neon-yellow); margin-top: 5px; }

.toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 18px; background: var(--card); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--neon-blue); }
.btn { padding: 15px; border-radius: 12px; border: 3px solid transparent; font-weight: 700; text-transform: uppercase; cursor: pointer; font-family: 'Oswald'; font-size: 0.95rem; text-align: center; transition: 0.2s; }
.btn-primary { background: #000; color: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255,0,122,0.5); }
.btn-primary:active { box-shadow: 0 0 20px var(--neon-pink); }
.btn-export { background: #000; color: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,242,255,0.5); }
.btn-export:disabled { color: #444; border-color: #444; box-shadow: none; cursor: not-allowed; }

.controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 18px; background: rgba(255,255,255,0.02); margin: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
.control-group { display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
label { font-size: 0.65rem; font-weight: 700; color: var(--neon-yellow); text-transform: uppercase; display: flex; justify-content: space-between; letter-spacing: 1px; }
label span { color: var(--neon-blue); }
input[type=range] { -webkit-appearance: none; background: #222; border-radius: 5px; height: 7px; accent-color: var(--neon-pink); }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #000; border: 2px solid var(--neon-pink); border-radius: 50%; box-shadow: 0 0 10px var(--neon-pink); }
select { background: #000; color: white; border: 2px solid var(--neon-pink); padding: 10px; border-radius: 8px; font-family: 'Oswald', sans-serif; box-shadow: 0 0 5px rgba(255,0,122,0.3); font-size: 0.85rem; }

/* Zone Aperçu Global */
.master-preview-box { padding: 15px; text-align: center; background: #111; border: 1px dashed var(--neon-yellow); margin: 10px; border-radius: 10px; }
.master-wrap { position: relative; display: inline-block; background: #222; border: 2px solid #444; overflow: hidden; }
.grid-line-v { position: absolute; top: 0; bottom: 0; border-left: 1px dashed rgba(255, 0, 122, 0.7); pointer-events: none; }
.grid-line-h { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(255, 0, 122, 0.7); pointer-events: none; }

.workspace { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 45px; overflow-x: hidden; }
/* TAILLE AJUSTÉE : Toujours visible entièrement à l'ouverture */
.page-container { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.9); position: relative; width: 85vw; height: calc(85vw * 1.414); max-width: 380px; max-height: 537px; border: 1px solid #ddd; overflow: hidden; border-radius: 4px; }
.page-label { position: absolute; top: -28px; left: 0; color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 5px var(--neon-blue); }

#modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; flex-direction: column; overflow-y: auto; }
.export-item { margin-bottom: 30px; text-align: center; border: 2px solid var(--neon-blue); padding: 15px; border-radius: 12px; background: #000; box-shadow: 0 0 20px rgba(0,242,255,0.3); }
.export-item img { width: 100%; max-width: 350px; border: 1px solid #333; margin-bottom: 15px; border-radius: 5px; }
</style>
</head>
<body>

<header>
    <h1>Maman Sokal</h1>
    <div class="subtitle">Art & Precision Studio</div>
</header>

<div class="toolbar">
    <label for="fileIn" class="btn btn-primary" style="text-align:center">✦ Image</label>
    <input type="file" id="fileIn" accept="image/*" style="display:none">
    <button class="btn btn-export" id="btnExp" disabled>⬇ Exporter</button>
</div>

<div class="controls">
    <div class="control-group"><label>Taille <span id="vSize">100%</span></label><input type="range" id="size" min="10" max="800" value="100"></div>
    <div class="control-group"><label>Marge Imprimante <span id="vMarg">8mm</span></label><input type="range" id="marg" min="0" max="30" value="8"></div>
    <div class="control-group"><label>Intensité Noir <span id="vCont">100</span></label><input type="range" id="cont" min="50" max="250" value="100"></div>
    
    <div class="control-group"><label>Style Rendu</label>
    <select id="stencilStyle">
        <option value="liner">Contours Seuls (Linework)</option>
        <option value="shades">Contours + Shades (Portrait)</option>
        <option value="real">Complet Realiste (Full Detail)</option>
    </select></div>

    <div class="control-group"><label>Montage (A4)</label><select id="pages">
        <option value="1">1 Page</option><option value="4">4 Pages (2x2)</option>
        <option value="6">6 Pages (2x3)</option><option value="9">9 Pages (3x3)</option>
        <option value="12">12 Pages (3x4)</option>
    </select></div>
</div>

<div class="master-preview-box">
    <div style="font-size: 0.7rem; color: var(--neon-yellow); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Aperçu du Montage Complet</div>
    <div id="masterWrap" class="master-wrap"></div>
</div>

<div class="workspace" id="drawZone"></div>

<div id="modal">
    <button class="btn btn-primary" style="margin-bottom:25px; width:100%" onclick="this.parentElement.style.display='none'">✕ Retour au Studio</button>
    <div id="exportList"></div>
</div>

<script>
let state = { img: null, size: 100, pages: 1, margin: 8, cont: 100, style: 'liner' };
const A4_W = 794, A4_H = 1123, $ = id => document.getElementById(id);

$('fileIn').onchange = (e) => {
    const reader = new FileReader(); reader.onload = (ev) => {
        const i = new Image(); i.onload = () => { state.img = i; $('btnExp').disabled = false; render(); };
        i.src = ev.target.result;
    }; reader.readAsDataURL(e.target.files[0]);
};

['size','marg','cont'].forEach(id => $(id).oninput = (e) => { 
    state[id] = e.target.value; 
    $(id==='size'?'vSize':id==='marg'?'vMarg':'vCont').textContent = 
    id==='marg'?e.target.value+'mm':id==='size'?e.target.value+'%':e.target.value;
    render(); 
});
$('stencilStyle').onchange = (e) => { state.style = e.target.value; render(); };
$('pages').onchange = (e) => { state.pages = parseInt(e.target.value); render(); };

function applyStencilEffects(ctx, style, contrast) {
    const imageData = ctx.getImageData(0, 0, A4_W, A4_H);
    const d = imageData.data;
    const factor = (259 * (parseInt(contrast) + 255)) / (255 * (259 - parseInt(contrast)));
    
    // Paramètres selon le style choisi
    const settings = {
        liner: { contrastFactor: factor, shades: false, shadesIntensity: 0 },
        shades: { contrastFactor: 1.2, shades: true, shadesIntensity: 198 },
        real: { contrastFactor: factor, shades: true, shadesIntensity: 160 }
    }[style];

    for (let i = 0; i < d.length; i += 4) {
        // Ignorer le blanc pur
        if (d[i] > 250 && d[i+1] > 250 && d[i+2] > 250) { d[i]=d[i+1]=d[i+2]=255; continue; }

        // Application du contraste
        d[i] = settings.contrastFactor * (d[i] - 128) + 128;
        d[i+1] = settings.contrastFactor * (d[i+1] - 128) + 128;
        d[i+2] = settings.contrastFactor * (d[i+2] - 128) + 128;

        // Application de la trame (Shades)
        if(settings.shades) {
            let avg = (d[i] + d[i+1] + d[i+2]) / 3;
            // Seuil affiné pour garder les contours sombres et tramer le reste
            let val = (avg < settings.shadesIntensity && avg < Math.random()*255) ? 0 : 255;
            d[i]=d[i+1]=d[i+2]=val;
        } else {
            // Mode Linework : Tout ou rien pour des contours purs
            let avg = (d[i] + d[i+1] + d[i+2]) / 3;
            let val = (avg < factor) ? 0 : 255;
            d[i]=d[i+1]=d[i+2]=val;
        }
    }
    ctx.putImageData(imageData, 0, 0);
}

function render() {
    if(!state.img) return;
    const zone = $('drawZone'); zone.innerHTML = '';
    const master = $('masterWrap'); master.innerHTML = '';

    let cols = state.pages === 1 ? 1 : (state.pages <= 6 ? 2 : 3);
    let rows = Math.ceil(state.pages / cols);
    const mPx = state.margin * 3.78;
    const usableW = A4_W - mPx * 2; const usableH = A4_H - mPx * 2;
    const totalImageW = usableW * (state.size/100) * cols;
    const totalImageH = totalImageW * (state.img.height / state.img.width);

    // DESSIN DE L'APERÇU GLOBAL (MINIATURE)
    const scale = 0.25;
    master.style.width = (usableW * cols * scale) + "px";
    master.style.height = (usableH * rows * scale) + "px";
    
    const masterImg = new Image(); masterImg.src = state.img.src;
    masterImg.style.position = 'absolute';
    masterImg.style.width = (totalImageW * scale) + "px";
    masterImg.style.height = (totalImageH * scale) + "px";
    masterImg.style.left = ((usableW * cols - totalImageW) / 2 * scale) + "px";
    masterImg.style.top = ((usableH * rows - totalImageH) / 2 * scale) + "px";
    masterImg.style.filter = `contrast(${state.cont}%) grayscale(100%)`;
    master.appendChild(masterImg);

    // LIGNES DE DÉCOUPE (JAUNES DASHED)
    for(let c=1; c<cols; c++) {
        let l = document.createElement('div'); l.className='grid-line-v';
        l.style.left = (c * usableW * scale) + "px"; master.appendChild(l);
    }
    for(let r=1; r<rows; r++) {
        let l = document.createElement('div'); l.className='grid-line-h';
        l.style.top = (r * usableH * scale) + "px"; master.appendChild(l);
    }

    // GÉNÉRATION DES PAGES INDIVIDUELLES
    for(let i=0; i<state.pages; i++) {
        const wrap = document.createElement('div'); wrap.className = 'page-container';
        const lbl = document.createElement('div'); lbl.className = 'page-label'; lbl.textContent = `PAGE ${i+1}`;
        wrap.appendChild(lbl);
        const cv = document.createElement('canvas'); cv.width = A4_W; cv.height = A4_H; cv.style.width = "100%";
        const ctx = cv.getContext('2d'); ctx.fillStyle = "white"; ctx.fillRect(0,0,A4_W,A4_H);
        const col = i % cols; const row = Math.floor(i / cols);
        
        // DESSIN DE LA ZONE DE SÉCURITÉ IMPRIMANTE (CADRE ROUGE LEGER)
        ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; ctx.lineWidth = 2;
        ctx.strokeRect(mPx, mPx, usableW, usableH);

        ctx.save(); ctx.rect(mPx, mPx, usableW, usableH); ctx.clip();
        
        // CENTRAGE AUTOMATIQUE STABLE
        const offsetX = (usableW * cols - totalImageW) / 2;
        const offsetY = (usableH * rows - totalImageH) / 2;
        
        ctx.drawImage(state.img, mPx + offsetX - col * usableW, mPx + offsetY - row * usableH, totalImageW, totalImageH);
        
        // APPLICATION DU STYLE DE STENCIL
        applyStencilEffects(ctx, state.style, state.cont);
        
        ctx.restore(); wrap.appendChild(cv); zone.appendChild(wrap);
    }
}

$('btnExp').onclick = () => {
    const list = $('exportList'); list.innerHTML = '';
    document.querySelectorAll('canvas').forEach((c, idx) => {
        const item = document.createElement('div'); item.className = 'export-item';
        const img = new Image(); img.src = c.toDataURL("image/png");
        const btn = document.createElement('button'); btn.className = 'btn btn-export';
        btn.style.width="100%"; btn.textContent = `Enregistrer Page ${idx+1}`;
        btn.onclick = () => {
            const w = window.open("");
            w.document.write("<body style='margin:0;background:black;display:flex;justify-content:center;align-items:center;'><img src='"+img.src+"' style='max-width:100%;'><p style='color:white;position:fixed;bottom:20px;font-family:sans-serif;'>Appui long pour enregistrer</p></body>");
        };
        item.appendChild(img); item.appendChild(btn); list.appendChild(item);
    });
    $('modal').style.display = 'flex';
};
</script>
</body>
</html>
