<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Sokal Master Edition 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 30px; }
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; font-weight: 700; text-transform: uppercase; }
        .sig-header { color: var(--pink); font-size: 0.9rem; font-weight: 500; }
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }
        .gabarit-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #111; border-bottom: 1px solid #2d2d44; }
        .segmented-control { display: flex; background: #000; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
        .seg-btn { flex: 1; padding: 8px; font-size: 0.75rem; font-weight: 600; text-align: center; color: #aaa; border: none; background: transparent; cursor: pointer; }
        .seg-btn-active { background: var(--pink); color: #000 !important; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--pink); height: 25px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 7px; border-radius: 4px; font-size: 0.8rem; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 100px; margin: 0 auto; }
        .dp-btn { background: #000; border: 1px solid #333; color: var(--cyan); padding: 8px; border-radius: 5px; font-size: 1rem; border: none; }
        .canvas-area { margin-top: 10px; padding: 5px; background: #000; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #2d2d44; }
        canvas { background: #fff; max-width: 100%; height: auto; display: block; border: 2px solid var(--pink); }
    </style>
</head>
<body>

<header>
    <h1>Stencil Pro Master</h1>
    <div class="sig-header">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">Effacer</button>
    <button class="btn btn-exp" id="btnExp">Exporter</button>
</div>

<div class="gabarit-zone">
    <div class="gabarit-panel">
        <div style="font-size:0.65rem; color:#888; margin-bottom:2px">ORIENTATION</div>
        <div class="segmented-control" id="ctrlOrient">
            <button class="seg-btn seg-btn-active" data-value="p">PORT.</button>
            <button class="seg-btn" data-value="l">PAYS.</button>
        </div>
    </div>
    <div class="gabarit-panel">
        <div style="font-size:0.65rem; color:#888; margin-bottom:2px">PAGES A4</div>
        <div class="segmented-control" id="ctrlPages">
            <button class="seg-btn" data-value="1">1</button>
            <button class="seg-btn" data-value="2">2</button>
            <button class="seg-btn seg-btn-active" data-value="4">4</button>
            <button class="seg-btn" data-value="6">6</button>
            <button class="seg-btn" data-value="12">12</button>
        </div>
    </div>
</div>

<div class="control-grid">
    <div class="panel full">
        <label>Mode Tatouage</label>
        <select id="renderStyle">
            <option value="original">IMAGE D'ORIGINE (Ajustable)</option>
            <option value="shades">RÉALISME (Ombrages fluides)</option>
            <option value="bold">CONTOURS NETS (Ligne pure)</option>
            <option value="dotwork">DOTWORK (Dégradé de points)</option>
        </select>
    </div>

    <div class="panel">
        <label>Vider le Noir</label>
        <select id="noFill">
            <option value="no">NON (Rempli)</option>
            <option value="yes">OUI (Squelette)</option>
        </select>
    </div>
    <div class="panel">
        <label>Noir / Contraste <span id="vBlack">128</span></label>
        <input type="range" id="black" min="0" max="255" value="128">
    </div>

    <div class="panel">
        <label>Taille Image <span id="vSize">100%</span></label>
        <input type="range" id="size" min="10" max="300" value="100">
    </div>
    <div class="panel">
        <label>Chevauchement <span id="vOverlap">10px</span></label>
        <input type="range" id="overlap" min="0" max="60" value="10">
    </div>

    <div class="panel full">
        <label>Position Précise</label>
        <div class="d-pad">
            <div></div><button class="dp-btn" data-dx="0" data-dy="-35">▲</button><div></div>
            <button class="dp-btn" data-dx="-35" data-dy="0">◀</button>
            <button class="dp-btn" data-dx="0" data-dy="0" style="color:var(--pink)">◎</button>
            <button class="dp-btn" data-dx="35" data-dy="0">▶</button>
            <div></div><button class="dp-btn" data-dx="0" data-dy="35">▼</button><div></div>
        </div>
    </div>
</div>

<div class="canvas-area">
    <canvas id="gCanvas"></canvas>
</div>

<script>
    const $ = id => document.getElementById(id);
    const cv = $('gCanvas'), ctx = cv.getContext('2d');
    let img = null;
    let st = { x:0, y:0, size:100, black:128, style:'original', pages:4, orient:'p', rot:0, overlap:10, noFill:'no' };

    $('fIn').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { 
            img = new Image(); 
            img.onload = () => render();
            img.src = ev.target.result; 
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function setupSegmented(containerId, stateKey) {
        $(containerId).querySelectorAll('.seg-btn').forEach(btn => {
            btn.onclick = () => {
                $(containerId).querySelector('.seg-btn-active').classList.remove('seg-btn-active');
                btn.classList.add('seg-btn-active');
                st[stateKey] = btn.dataset.value;
                render();
            };
        });
    }
    setupSegmented('ctrlOrient', 'orient');
    setupSegmented('ctrlPages', 'pages');

    document.querySelectorAll('.dp-btn').forEach(btn => {
        btn.onclick = () => {
            const dx = parseInt(btn.dataset.dx), dy = parseInt(btn.dataset.dy);
            if(dx === 0 && dy === 0) { st.x = 0; st.y = 0; } else { st.x += dx; st.y += dy; }
            render();
        };
    });

    function render() {
        if(!img) return;
        const A4W = st.orient === 'p' ? 794 : 1123;
        const A4H = st.orient === 'p' ? 1123 : 794;
        const p = parseInt(st.pages);
        const ov = parseInt(st.overlap);
        
        let cols = (p === 2) ? 2 : (p === 6 || p === 12) ? 3 : Math.ceil(Math.sqrt(p));
        let rows = Math.ceil(p / cols);
        
        cv.width = (A4W * cols) - (ov * (cols - 1));
        cv.height = (A4H * rows) - (ov * (rows - 1));
        
        ctx.fillStyle = "white"; ctx.fillRect(0,0,cv.width,cv.height);
        
        ctx.save();
        ctx.translate(cv.width/2 + st.x, cv.height/2 + st.y);
        let dw = cv.width * (st.size/100);
        let dh = dw * (img.height/img.width);
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        processImage();

        // Séparations Magenta avec Numéros
        ctx.lineWidth = 4;
        ctx.setLineDash([]);
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                let x = c * (A4W - ov);
                let y = r * (A4H - ov);
                ctx.strokeStyle = "rgba(255, 0, 122, 0.7)";
                ctx.strokeRect(x, y, A4W, A4H);
                ctx.fillStyle = "rgba(255, 0, 122, 0.4)";
                ctx.font = "bold 22px Oswald";
                ctx.fillText(`FEUILLE ${r * cols + c + 1}`, x + 15, y + 35);
            }
        }
        
        cv.style.width = "95%";
        $('vBlack').textContent = st.black;
        $('vSize').textContent = st.size + "%";
        $('vOverlap').textContent = st.overlap + "px";
    }

    function processImage() {
        const idat = ctx.getImageData(0,0,cv.width,cv.height);
        const d = idat.data, w = cv.width;
        const temp = new Uint8ClampedArray(d);

        for (let i = 0; i < d.length; i += 4) {
            let v = (temp[i]+temp[i+1]+temp[i+2])/3;
            
            if(st.style === 'original') {
                let f = st.black / 128;
                d[i] = Math.min(255, temp[i] * f);
                d[i+1] = Math.min(255, temp[i+1] * f);
                d[i+2] = Math.min(255, temp[i+2] * f);
            } else if(st.style === 'shades') {
                let res = v < st.black ? (v < st.black/2 ? 0 : 160) : 255;
                d[i] = d[i+1] = d[i+2] = res;
            } else if(st.style === 'bold') {
                const x = (i/4)%w;
                if(x > 0) {
                    let vL = (temp[i-4]+temp[i-3]+temp[i-2])/3;
                    d[i] = d[i+1] = d[i+2] = Math.abs(v - vL) > (255-st.black)/6 ? 0 : 255;
                }
            } else if(st.style === 'dotwork') {
                // Algorithme de trame (Bayer dither simplifié)
                let x = (i/4)%w, y = Math.floor((i/4)/w);
                let threshold = ((x % 4) * 4 + (y % 4)) * 16;
                d[i] = d[i+1] = d[i+2] = v < (st.black * (threshold/255)) ? 0 : 255;
            }

            // Option VIDER LE NOIR (Sur tous les modes)
            if(st.noFill === 'yes' && d[i] < 50) {
                // On transforme le noir plein en blanc avec un petit contour
                d[i] = d[i+1] = d[i+2] = 255; 
                if(i > 4 && d[i-4] > 200) d[i-4]=d[i-3]=d[i-2]=0; // Ajoute un contour fin
            }
        }
        ctx.putImageData(idat, 0,0);
    }

    $('renderStyle').onchange = (e) => { st.style = e.target.value; render(); };
    $('noFill').onchange = (e) => { st.noFill = e.target.value; render(); };
    $('black').oninput = (e) => { st.black = e.target.value; render(); };
    $('overlap').oninput = (e) => { st.overlap = e.target.value; render(); };
    $('size').oninput = (e) => { st.size = e.target.value; render(); };
</script>
</body>
</html>
