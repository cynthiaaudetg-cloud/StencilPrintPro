<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stencil Print Pro | Line Extractor 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007a; --cyan: #00f2ff; --green: #39ff14; --dark: #0a0a0f; --panel: #161625; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #eee; padding-bottom: 30px; }
        header { padding: 10px 15px; background: #000; border-bottom: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.1rem; color: #fff; font-weight: 700; text-transform: uppercase; }
        .sig-header { color: var(--pink); font-size: 0.8rem; font-weight: 500; }
        .main-nav { display: grid; grid-template-columns: 2fr 1.5fr 2fr; gap: 8px; padding: 10px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; text-align: center; color: #000; }
        .btn-load { background: var(--cyan); }
        .btn-reset { background: #444; color: #fff; }
        .btn-exp { background: var(--green); }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--cyan); margin-bottom: 4px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--pink); height: 30px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 0.85rem; }
        /* D-PAD AMÉLIORÉ */
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 120px; margin: 5px auto; }
        .dp-btn { background: #000; border: 1px solid var(--cyan); color: var(--cyan); height: 40px; border-radius: 8px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
        .dp-btn:active { background: var(--cyan); color: #000; }
        .canvas-area { margin-top: 10px; padding: 5px; background: #000; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        canvas { background: #fff; max-width: 100%; height: auto; border: 1px solid #333; }
        .seg-btn-active { background: var(--pink); color: #000 !important; }
    </style>
</head>
<body>

<header>
    <h1>Stencil Print Pro</h1>
    <div class="sig-header">Maman Sokal 🖤</div>
</header>

<div class="main-nav">
    <label for="fIn" class="btn btn-load">✦ Importer</label>
    <input type="file" id="fIn" accept="image/*" style="display:none">
    <button class="btn btn-reset" onclick="location.reload()">Reset</button>
    <button class="btn btn-exp" id="btnExp">Exporter</button>
</div>

<div class="control-grid">
    <div class="panel full">
        <label>Mode de Tracé</label>
        <select id="renderStyle">
            <option value="lines">LIGNES UNIQUEMENT (Sans remplissage)</option>
            <option value="shades">RÉALISME (Ombrages & Gris)</option>
            <option value="original">ORIGINAL (Photo)</option>
        </select>
    </div>

    <div class="panel">
        <label>Montage</label>
        <select id="ctrlPages">
            <option value="1">1 Page</option>
            <option value="2">2 Pages (1x2)</option>
            <option value="4">4 Pages (2x2)</option>
            <option value="6">6 Pages (3x2)</option>
            <option value="9">9 Pages (3x3)</option>
            <option value="12">12 Pages (3x4)</option>
        </select>
    </div>

    <div class="panel">
        <label>Rotation <span id="vRot">0</span>°</label>
        <input type="range" id="rotation" min="0" max="360" value="0">
    </div>

    <div class="panel">
        <label>Épaisseur Ligne <span id="vBlack">128</span></label>
        <input type="range" id="black" min="0" max="255" value="128">
    </div>
    <div class="panel">
        <label>Taille Image <span id="vSize">100%</span></label>
        <input type="range" id="size" min="10" max="250" value="100">
    </div>

    <div class="panel full">
        <label>Déplacement Tactile</label>
        <div class="d-pad">
            <div></div><button class="dp-btn" data-dx="0" data-dy="-50">▲</button><div></div>
            <button class="dp-btn" data-dx="-50" data-dy="0">◀</button>
            <button class="dp-btn" data-dx="0" data-dy="0" style="border-color:var(--pink); color:var(--pink)">◎</button>
            <button class="dp-btn" data-dx="50" data-dy="0">▶</button>
            <div></div><button class="dp-btn" data-dx="0" data-dy="50">▼</button><div></div>
        </div>
    </div>
</div>

<div class="canvas-area">
    <canvas id="gCanvas"></canvas>
</div>

<script>
    const $ = id => document.getElementById(id);
    const cv = $('gCanvas'), ctx = cv.getContext('2d');
    let img = null;
    let st = { x:0, y:0, size:100, black:128, style:'lines', pages:1, orient:'p', rot:0 };

    $('fIn').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { 
            img = new Image(); 
            img.onload = () => render();
            img.src = ev.target.result; 
        };
        r.readAsDataURL(e.target.files[0]);
    };

    document.querySelectorAll('.dp-btn').forEach(btn => {
        btn.onclick = () => {
            const dx = parseInt(btn.dataset.dx), dy = parseInt(btn.dataset.dy);
            if(dx === 0 && dy === 0) { st.x = 0; st.y = 0; } else { st.x += dx; st.y += dy; }
            render();
        };
    });

    function render() {
        if(!img) return;
        const A4W = 794, A4H = 1123;
        const p = parseInt($('ctrlPages').value);
        
        let cols, rows;
        if (p === 2) { cols = 2; rows = 1; }
        else if (p === 6) { cols = 3; rows = 2; }
        else if (p === 9) { cols = 3; rows = 3; }
        else if (p === 12) { cols = 3; rows = 4; }
        else { cols = Math.ceil(Math.sqrt(p)); rows = Math.ceil(p / cols); }
        
        cv.width = A4W * cols; cv.height = A4H * rows;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,cv.width,cv.height);
        
        ctx.save();
        ctx.translate(cv.width/2 + st.x, cv.height/2 + st.y);
        ctx.rotate(st.rot * Math.PI / 180);
        let dw = cv.width * (st.size/100);
        let dh = dw * (img.height/img.width);
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.restore();

        if (st.style === 'lines') {
            const idat = ctx.getImageData(0,0,cv.width,cv.height);
            const d = idat.data;
            const threshold = st.black;
            for (let i = 0; i < d.length; i += 4) {
                // Détection de bord simple (Laplacien / Gradient)
                let v = (d[i]+d[i+1]+d[i+2])/3;
                let right = (d[i+4]+d[i+5]+d[i+6])/3 || v;
                let diff = Math.abs(v - right);
                let edge = diff > (255 - threshold) ? 0 : 255;
                d[i] = d[i+1] = d[i+2] = edge;
            }
            ctx.putImageData(idat, 0,0);
        } else if (st.style === 'shades') {
            const idat = ctx.getImageData(0,0,cv.width,cv.height);
            const d = idat.data;
            for (let i = 0; i < d.length; i += 4) {
                let v = (d[i]+d[i+1]+d[i+2])/3;
                v = v < st.black ? (v < st.black/2 ? 0 : 180) : 255;
                d[i] = d[i+1] = d[i+2] = v;
            }
            ctx.putImageData(idat, 0,0);
        }

        // Grille de découpe
        ctx.setLineDash([15, 10]);
        ctx.strokeStyle = "rgba(255, 0, 122, 0.5)";
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                ctx.strokeRect(c*A4W, r*A4H, A4W, A4H);
            }
        }
        
        $('vBlack').textContent = st.black; 
        $('vSize').textContent = st.size + "%"; $('vRot').textContent = st.rot;
    }

    $('black').oninput = (e) => { st.black = e.target.value; render(); };
    $('rotation').oninput = (e) => { st.rot = e.target.value; render(); };
    $('size').oninput = (e) => { st.size = e.target.value; render(); };
    $('renderStyle').onchange = (e) => { st.style = e.target.value; render(); };
    $('ctrlPages').onchange = () => render();
</script>
</body>
</html>
